name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 2 */5 * *'  # 每 5 天執行一次（UTC 02:00 = 台灣 10:00）
  workflow_dispatch:        # 允許手動觸發

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent auto-pause
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://bkovbcdqhljrnpyhfqdq.supabase.co/rest/v1/questions?select=id&limit=1")
          echo "Supabase response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: unexpected status $STATUS"
            exit 1
          fi
