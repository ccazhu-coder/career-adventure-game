<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理後台登入｜知己知途</title>
  <link rel="stylesheet" href="admin-layout.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="app">
  <header class="hero">
    <h1>管理後台</h1>
    <p>最高權限：批次管理、全部學員資料、諮詢師帳號管理、額度與報告資料庫。</p>
    <div class="links">
      <a href="./index.html" target="_blank" rel="noopener">學員前台</a>
      <a href="./counselor-login.html" target="_blank" rel="noopener">諮詢師後台</a>
    </div>
  </header>

  <section id="loginPanel" class="panel login">
    <h2>管理者登入</h2>
    <div class="grid">
      <div class="field"><label>Email</label><input id="loginEmail" type="email" autocomplete="username" placeholder="管理者 Email"></div>
      <div class="field"><label>密碼</label><input id="loginPass" type="password" autocomplete="current-password" placeholder="密碼"></div>
    </div>
    <div style="margin-top:14px"><button class="btn primary" onclick="login()">登入管理後台</button></div>
    <div id="loginMsg" class="notice hidden"></div>
  </section>
</div>

<script src="admin-common.js"></script>
<script>
async function login(){
  hideMsg("loginMsg");
  const email=document.getElementById("loginEmail").value.trim();
  const password=document.getElementById("loginPass").value;
  if(!email||!password){showMsg("loginMsg","請輸入 Email 與密碼。",true);return;}
  const {data,error}=await sb.auth.signInWithPassword({email,password});
  if(error){showMsg("loginMsg","登入失敗："+error.message,true);return;}
  const {data:profile,error:perr}=await sb.from("profiles").select("role").eq("id",data.session.user.id).maybeSingle();
  if(perr || !profile || profile.role!=="owner"){
    await sb.auth.signOut();
    showMsg("loginMsg","此帳號非管理者帳號，請改用「諮詢師後台」登入。",true);
    return;
  }
  location.href="dashboard.html";
}

(async function init(){
  if(new URLSearchParams(location.search).get("denied")==="1"){
    showMsg("loginMsg","此帳號無權限進入最高權限後台，請改用「諮詢師後台」登入。",true);
  }
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    const {data:profile}=await sb.from("profiles").select("role").eq("id",session.user.id).maybeSingle();
    if(profile && profile.role==="owner"){ location.href="dashboard.html"; return; }
    await sb.auth.signOut();
  }
})();
</script>
</body>
</html>
