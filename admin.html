<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>知己知途｜後台入口</title>
  <style>
    :root{--bg:#F3EFE4;--paper:#FFFDF8;--ink:#162B25;--muted:#68776F;--green:#173F33;--green2:#2E6B55;--gold:#B8872E;--line:#E0D3BD;--shadow:0 18px 48px rgba(26,43,35,.12)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:linear-gradient(135deg,#F7F1E2 0%,#F3EFE4 48%,#EAF1EA 100%);color:var(--ink);font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,-apple-system,Segoe UI,sans-serif;line-height:1.6}
    .app{max-width:1040px;margin:0 auto;padding:28px 16px 64px}
    .hero{background:linear-gradient(135deg,#102A23,#173F33 68%,#80601F 150%);color:#fff;border-radius:28px;padding:28px;box-shadow:var(--shadow)}
    h1{margin:0;font-size:clamp(30px,5vw,46px)}
    .hero p{margin:10px 0 0;color:#F8ECD1}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-top:22px}
    .card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:var(--shadow)}
    .card h2{margin:0 0 8px;color:var(--green);font-size:26px}
    .card p{margin:0 0 18px;color:var(--muted)}
    .btn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:12px 18px;font-weight:1000;text-decoration:none;background:linear-gradient(135deg,#143B30,#24624E);color:#fff}
    .btn.gold{background:linear-gradient(135deg,#805414,#BF8E32)}
    .note{margin-top:18px;background:#FFF7E4;border:1px solid #E4C778;color:#6B501E;border-radius:16px;padding:12px 14px}
    @media(max-width:720px){.app{padding:14px 10px 44px}.hero{border-radius:20px;padding:20px}.grid{grid-template-columns:1fr}.btn{width:100%}}
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>知己知途｜後台入口</h1>
      <p>請依照身份進入對應後台。諮詢師與最高管理者已分流，避免權限與功能混在一起。</p>
    </section>
    <section class="grid">
      <article class="card">
        <h2>諮詢師後台</h2>
        <p>建立施測批次、查看學員測驗紀錄、下載 PDF 報告與查看諮詢分析。</p>
        <a class="btn" href="consultant_admin.html">進入諮詢師後台</a>
      </article>
      <article class="card">
        <h2>最高管理者後台</h2>
        <p>最高權限專用。管理授權方案、諮詢師額度、密碼協助、批次與全部資料。</p>
        <a class="btn gold" href="owner_admin.html">進入最高管理者後台</a>
      </article>
    </section>
    <div class="note">你的最高管理者帳號請使用最高管理者後台登入；其它諮詢師請使用諮詢師後台。</div>
  </main>
</body>
</html>
