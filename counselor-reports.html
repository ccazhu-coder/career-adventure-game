<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>報告查詢｜諮詢師後台｜知己知途</title>
  <link rel="stylesheet" href="admin-layout.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="admin-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">

      <div class="subhead">
        <div>
          <h2>報告查詢</h2>
          <p>整理您負責批次學員的個案／諮詢師報告產出狀態，可快速篩選尚缺報告的學員，並下載 PDF、查看諮詢分析與文字報告。</p>
        </div>
      </div>
      <div class="toolbar">
        <div class="left">
          <input id="searchInput" oninput="onReportFilterChange()" placeholder="搜尋姓名、Email、短碼...">
          <select id="batchFilter" onchange="onReportFilterChange()"><option value="">全部批次</option></select>
          <select id="statusFilter" onchange="onReportFilterChange()">
            <option value="">全部報告狀態</option>
            <option value="missing_case">尚缺個案報告 PDF</option>
            <option value="missing_counselor">尚缺諮詢師報告 PDF</option>
            <option value="missing_any">任一報告尚未產出</option>
            <option value="complete">報告皆已產出</option>
          </select>
        </div>
        <div class="right">
          <button class="btn" onclick="loadSubmissions()">重新整理</button>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><b id="totalCount">0</b><span>總測驗紀錄</span></div>
        <div class="stat"><b id="casePdfCount">0</b><span>已產出個案報告</span></div>
        <div class="stat"><b id="counselorPdfCount">0</b><span>已產出諮詢師報告</span></div>
        <div class="stat"><b id="visibleCount">0</b><span>目前顯示</span></div>
      </div>
      <div id="reportMsg" class="notice hidden"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>送出時間</th><th>姓名</th><th>Email</th><th>批次/短碼</th><th>個案報告</th><th>諮詢師報告</th><th>諮詢分析／文字報告</th></tr>
          </thead>
          <tbody id="reportRows"></tbody>
        </table>
      </div>
      <div id="reportPagination" class="pagination"></div>

    </div>
  </div>
</div>

<script src="counselor-common.js"></script>
<script src="counselor-auth.js"></script>
<script src="counselor-logs.js"></script>
<script>
let allSubmissions=[];
let reportPage=1;
let counselorEmail="";
const REPORT_PAGE_SIZE=20;

(async function init(){
  const auth=await requireConsultant();
  if(!auth) return;
  counselorEmail=auth.email;
  renderCounselorShell("counselor-reports",{title:"報告查詢",sessionLabel:`已登入：${auth.profile.display_name||auth.session.user.email}`});
  await loadSubmissions();
})();

function onReportFilterChange(){
  reportPage=1;
  renderReports();
}

async function loadSubmissions(){
  hideMsg("reportMsg");
  const {data,error}=await sb.from("submissions").select("*").eq("counselor_email",counselorEmail).order("created_at",{ascending:false});
  if(error){showMsg("reportMsg","學員資料讀取失敗："+error.message,true);return;}
  allSubmissions=data||[];
  populateBatchFilter();
  renderReports();
}
function populateBatchFilter(){
  const sel=document.getElementById("batchFilter");
  const cur=sel.value;
  const batches=new Map();
  allSubmissions.forEach(r=>{
    if(r.short_code) batches.set(r.short_code,r.batch_name||r.batch_code||r.short_code);
  });
  sel.innerHTML='<option value="">全部批次</option>'+[...batches.entries()].map(([code,name])=>`<option value="${escAttr(code)}">${esc(name)}（${esc(code)}）</option>`).join("");
  if(cur && batches.has(cur)) sel.value=cur;
}
function getFilteredSubmissions(){
  const q=document.getElementById("searchInput").value.trim().toLowerCase();
  const batchFilter=document.getElementById("batchFilter").value;
  const statusFilter=document.getElementById("statusFilter").value;
  return allSubmissions.filter(r=>{
    if(batchFilter && r.short_code!==batchFilter) return false;
    const hasCase=!!r.pdf_path;
    const hasCounselor=!!r.counselor_pdf_path;
    if(statusFilter==="missing_case" && hasCase) return false;
    if(statusFilter==="missing_counselor" && hasCounselor) return false;
    if(statusFilter==="missing_any" && hasCase && hasCounselor) return false;
    if(statusFilter==="complete" && !(hasCase && hasCounselor)) return false;
    if(!q) return true;
    return [r.name,r.email,r.holland_code,r.batch_code,r.short_code].some(v=>String(v||"").toLowerCase().includes(q));
  });
}
function renderReports(){
  const filtered=getFilteredSubmissions();
  document.getElementById("totalCount").textContent=allSubmissions.length;
  document.getElementById("casePdfCount").textContent=allSubmissions.filter(r=>!!r.pdf_path).length;
  document.getElementById("counselorPdfCount").textContent=allSubmissions.filter(r=>!!r.counselor_pdf_path).length;
  document.getElementById("visibleCount").textContent=filtered.length;

  const {pageItems,page,totalPages}=paginate(filtered,reportPage,REPORT_PAGE_SIZE);
  reportPage=page;
  document.getElementById("reportRows").innerHTML=pageItems.length ? pageItems.map(r=>{
    const advisorReport=r.counselor_report||"";
    const caseReportText=r.case_report_text||"";
    const reportId=`advisorReport_${escAttr(r.id)}`;
    const caseTextId=`caseReportText_${escAttr(r.id)}`;
    const hasPdf=!!r.pdf_path;
    const hasCounselorPdf=!!r.counselor_pdf_path;
    return `<tr>
      <td>${esc(fmtTime(r.created_at))}</td>
      <td><strong>${esc(r.name)}</strong></td>
      <td>${esc(r.email)}</td>
      <td>${esc(r.batch_name||r.batch_code||"")}<br><span class="code">${esc(r.short_code||"")}</span></td>
      <td>
        <span class="pill${hasPdf?" ok":" warn"}">${hasPdf?"已產出":"尚未產出"}</span>
        <button class="btn gold" style="margin-top:6px;${hasPdf?"":"opacity:.55;pointer-events:none"}" onclick="downloadCasePdf('${escAttr(r.id)}','${escAttr(r.pdf_path||"")}','${escAttr(r.pdf_filename||"報告.pdf")}')">下載個案報告</button>
      </td>
      <td>
        <span class="pill${hasCounselorPdf?" ok":" warn"}">${hasCounselorPdf?"已產出":"尚未產出"}</span>
        <button class="btn gold" style="margin-top:6px;${hasCounselorPdf?"":"opacity:.55;pointer-events:none"}" onclick="downloadCounselorPdf('${escAttr(r.id)}','${escAttr(r.counselor_pdf_path||"")}','${escAttr(r.counselor_pdf_filename||"諮詢師報告.pdf")}')">下載諮詢報告</button>
      </td>
      <td>
        <button class="btn" style="${advisorReport?"":"opacity:.55;pointer-events:none"}" onclick="copyReportSection('${reportId}','reportMsg','${escAttr(r.id)}','copy_advisor_report')">複製諮詢建議</button>
        ${advisorReport?`<details class="advisor-box"><summary>查看諮詢師專用分析</summary><div id="${reportId}" class="advisor-report">${esc(advisorReport)}</div></details>`:`<div class="muted" style="margin-top:6px">尚無諮詢分析</div>`}
        <button class="btn" style="margin-top:6px;${caseReportText?"":"opacity:.55;pointer-events:none"}" onclick="copyReportSection('${caseTextId}','reportMsg','${escAttr(r.id)}','copy_case_report')">複製文字報告</button>
        ${caseReportText?`<details class="case-box"><summary>查看可複製文字報告</summary><div id="${caseTextId}" class="case-report">${esc(caseReportText)}</div></details>`:`<div class="muted" style="margin-top:6px">尚無文字報告</div>`}
      </td>
    </tr>`;
  }).join("") : `<tr><td colspan="7" class="empty-state">尚無符合條件的報告資料。</td></tr>`;
  renderPagination("reportPagination",page,totalPages,p=>{reportPage=p;renderReports();});
}
async function downloadPdf(path,filename){
  if(!path){showMsg("reportMsg","此筆資料尚無 PDF。",true);return false;}
  const win=window.open("","_blank");
  const {data,error}=await sb.storage.from("reports").createSignedUrl(path,3600,{download:filename||true});
  if(error){if(win)win.close();showMsg("reportMsg","取得 PDF 連結失敗："+error.message,true);return false;}
  if(win) win.location.href=data.signedUrl; else window.open(data.signedUrl,"_blank");
  return true;
}
async function downloadCasePdf(id,path,filename){
  const ok=await downloadPdf(path,filename);
  if(ok) await logAction({actionType:"download_pdf",targetType:"submission",targetId:id,after:{filename}});
}
async function downloadCounselorPdf(id,path,filename){
  const ok=await downloadPdf(path,filename);
  if(ok) await logAction({actionType:"download_counselor_pdf",targetType:"submission",targetId:id,after:{filename}});
}
function copyReportSection(elId,msgId,submissionId,actionType){
  const text=document.getElementById(elId)?.innerText||"";
  if(!text){showMsg(msgId,"這筆資料尚無可複製的內容。",true);return;}
  navigator.clipboard.writeText(text).then(()=>{
    showMsg(msgId,"已複製內容。");
    logAction({actionType,targetType:"submission",targetId:submissionId});
  }).catch(()=>showMsg(msgId,"無法自動複製，請手動選取文字。",true));
}
</script>
</body>
</html>
