<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>重設密碼｜諮詢師後台｜知己知途</title>
  <link rel="stylesheet" href="admin-layout.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="app">
  <header class="hero">
    <h1>諮詢師後台</h1>
    <p>重設您的登入密碼。</p>
    <div class="links">
      <a href="./index.html" target="_blank" rel="noopener">學員前台</a>
    </div>
  </header>

  <section id="resetPanel" class="panel login">
    <h2>設定新密碼</h2>
    <div class="grid">
      <div class="field"><label>新密碼</label><input id="newPass" type="password" autocomplete="new-password" placeholder="至少 8 個字元"></div>
      <div class="field"><label>確認新密碼</label><input id="newPass2" type="password" autocomplete="new-password" placeholder="再次輸入密碼"></div>
    </div>
    <div style="margin-top:14px"><button id="resetBtn" class="btn primary" onclick="doReset()">確認更新密碼</button></div>
    <div id="resetMsg" class="notice hidden"></div>
  </section>

  <section id="invalidPanel" class="panel login" style="display:none">
    <div style="text-align:center;padding:8px 0 16px">
      <p style="color:#c0392b;margin-bottom:16px">此重設連結已失效或已使用。<br>請重新申請。</p>
      <a class="btn primary" href="counselor-login.html">返回登入頁</a>
    </div>
  </section>

  <section id="donePanel" class="panel login" style="display:none">
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:36px;margin-bottom:10px">✅</div>
      <h2 style="margin-bottom:8px">密碼更新成功！</h2>
      <p style="color:#555;margin-bottom:20px">請使用新密碼登入後台。</p>
      <a class="btn primary" href="counselor-login.html">前往登入</a>
    </div>
  </section>
</div>

<script src="counselor-common.js"></script>
<script>
async function doReset(){
  hideMsg("resetMsg");
  const p1=document.getElementById("newPass").value;
  const p2=document.getElementById("newPass2").value;
  if(!p1||!p2){showMsg("resetMsg","請輸入新密碼。",true);return;}
  if(p1.length<8){showMsg("resetMsg","密碼至少需要 8 個字元。",true);return;}
  if(p1!==p2){showMsg("resetMsg","兩次密碼不一致。",true);return;}
  const btn=document.getElementById("resetBtn");
  if(btn){btn.disabled=true;btn.textContent="更新中...";}
  try{
    const {error}=await sb.auth.updateUser({password:p1});
    if(error) throw error;
    await sb.auth.signOut();
    document.getElementById("resetPanel").style.display="none";
    document.getElementById("donePanel").style.display="";
  }catch(err){
    showMsg("resetMsg","更新失敗："+err.message,true);
  }finally{
    if(btn){btn.disabled=false;btn.textContent="確認更新密碼";}
  }
}

(async function init(){
  // Supabase v2 會自動從 URL hash 解析 recovery token 並建立 session
  const {data:{session},error}=await sb.auth.getSession();
  if(!session || error){
    document.getElementById("resetPanel").style.display="none";
    document.getElementById("invalidPanel").style.display="";
  }
})();
</script>
</body>
</html>
