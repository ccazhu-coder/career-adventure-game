<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>額度管理｜管理後台｜知己知途</title>
  <link rel="stylesheet" href="admin-layout.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    .balance-chip{display:inline-block;padding:3px 12px;border-radius:12px;font-size:13px;font-weight:700;}
    .bal-ok{background:#d4edda;color:#155724;}
    .bal-low{background:#fff3cd;color:#856404;}
    .bal-zero{background:#f8d7da;color:#721c24;}
    .type-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;}
    .type-grant{background:#d4edda;color:#155724;}
    .type-deduct{background:#f8d7da;color:#721c24;}
    .type-restore{background:#cce5ff;color:#004085;}
    .type-adjust{background:#e2e3e5;color:#383d41;}
    .type-batch{background:#fff3cd;color:#856404;}
    select.full-w{width:100%;height:40px;padding:0 10px;border:1px solid #d4c9a0;border-radius:6px;background:#fff;font-size:14px;}
    .grant-link{font-size:12px;color:#b8860b;text-decoration:underline;cursor:pointer;margin-left:8px;}
    .grant-link:hover{color:#9a6e08;}
  </style>
</head>
<body>
<div class="admin-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">

      <!-- ── 諮詢師額度總覽 ─────────────────────────────────────────────── -->
      <div class="subhead">
        <div>
          <h2>諮詢師額度總覽</h2>
          <p>顯示每位諮詢師的目前剩餘測驗次數。若需新增額度請至「<a href="plans.html">授權方案</a>」頁面。</p>
        </div>
        <div><button class="btn" onclick="loadAll()">重新整理</button></div>
      </div>
      <div class="toolbar">
        <div class="left"><input id="summarySearch" placeholder="搜尋姓名或 Email..." oninput="renderSummary()"></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>諮詢師</th>
              <th>Email</th>
              <th>角色</th>
              <th style="text-align:center">目前餘額</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="summaryRows"></tbody>
        </table>
      </div>
      <div id="summaryPagination" class="pagination"></div>

      <hr class="section-divider">

      <!-- ── 手動調整額度 ─────────────────────────────────────────────────── -->
      <div class="subhead">
        <div>
          <h2>手動調整額度</h2>
          <p>用於扣除（學員完成測驗）、補回（異常撤銷）或其他修正。若要新增額度請至「<a href="plans.html">授權方案</a>」。</p>
        </div>
      </div>
      <div class="batch-grid">
        <div class="field">
          <label>諮詢師</label>
          <select class="full-w" id="adjustCounselor" onchange="onAdjustCounselorChange()">
            <option value="">-- 請選擇諮詢師 --</option>
          </select>
        </div>
        <div class="field">
          <label>調整類型</label>
          <select class="full-w" id="adjustType">
            <option value="deduct">扣除額度（測驗完成）</option>
            <option value="restore">補回額度（撤銷測驗）</option>
            <option value="adjust">其他調整（可輸入負數）</option>
          </select>
        </div>
        <div class="field">
          <label>數量</label>
          <input id="adjustAmount" type="number" value="1" min="1">
        </div>
        <div class="field">
          <label>原因／備註</label>
          <input id="adjustReason" placeholder="例如：學員完成測驗 / 誤扣補回">
        </div>
        <div class="field" style="display:flex;align-items:flex-end;gap:12px">
          <button class="btn gold" onclick="doAdjust()">確認調整</button>
          <span id="adjustMsg" class="notice hidden" style="margin:0"></span>
        </div>
      </div>

      <hr class="section-divider">

      <!-- ── 完整帳本 ────────────────────────────────────────────────────── -->
      <div class="subhead">
        <div>
          <h2>完整帳本</h2>
          <p>所有額度異動紀錄（包含授權方案發放、扣除、補回、調整），依時間新到舊排序。</p>
        </div>
      </div>
      <div class="toolbar">
        <div class="left"><input id="txSearch" placeholder="搜尋諮詢師 Email..." oninput="onTxSearchChange()"></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>時間</th>
              <th>諮詢師</th>
              <th>類型</th>
              <th>數量</th>
              <th>原因</th>
              <th>操作者</th>
              <th>管理</th>
            </tr>
          </thead>
          <tbody id="txRows"></tbody>
        </table>
      </div>
      <div id="txPagination" class="pagination"></div>

    </div>
  </div>
</div>

<script src="admin-common.js"></script>
<script src="admin-auth.js"></script>
<script src="admin-logs.js"></script>
<script>
let allCreditTx=[];
let allAuthorizations=[];   // 舊快照，只讀不寫，用於計算餘額
let allCounselorProfiles=[];
let summaryPage=1;
let txPage=1;
const PAGE_SIZE=15;

const TX_LABELS={
  grant:"授權發放",
  deduct:"扣除",
  restore:"補回",
  adjust:"調整",
  batch_create:"批次建立扣除"
};
const TX_CLASS={
  grant:"type-grant",
  deduct:"type-deduct",
  restore:"type-restore",
  adjust:"type-adjust",
  batch_create:"type-batch"
};

(async function init(){
  const auth=await requireOwner();
  if(!auth) return;
  renderAdminShell("credits",{title:"額度管理",sessionLabel:`已登入：${auth.profile.display_name||auth.session.user.email}`});
  await loadAll();
})();

async function loadAll(){
  await Promise.all([loadCounselorProfiles(),loadCreditTx(),loadAuthorizations()]);
  populateAdjustDropdown();
  renderSummary();
  renderTx();
}

async function loadCounselorProfiles(){
  try{
    const res=await callAdminFunction({action:"list"});
    allCounselorProfiles=(res.profiles||[]).filter(p=>p.role!=="owner");
  }catch(e){ allCounselorProfiles=[]; }
}
async function loadCreditTx(){
  const {data}=await sb.from("credit_transactions").select("*").order("created_at",{ascending:false});
  allCreditTx=data||[];
}
async function loadAuthorizations(){
  const {data}=await sb.from("counselor_authorizations").select("*");
  allAuthorizations=data||[];
}

// ── 餘額計算 ──────────────────────────────────────────────────────────────────
function getBalance(email){
  const e=(email||"").toLowerCase();
  const legacy=(allAuthorizations||[])
    .filter(a=>(a.counselor_email||"").toLowerCase()===e)
    .reduce((s,a)=>s+((a.purchased_quantity||0)-(a.used_quantity||0)),0);
  const ledger=(allCreditTx||[])
    .filter(t=>(t.counselor_email||"").toLowerCase()===e)
    .reduce((s,t)=>s+(t.delta||0),0);
  return legacy+ledger;
}
function balClass(n){ return n>5?"bal-ok":(n>0?"bal-low":"bal-zero"); }

// ── 總覽 ──────────────────────────────────────────────────────────────────────
function renderSummary(){
  const q=document.getElementById("summarySearch").value.trim().toLowerCase();
  let rows=allCounselorProfiles.filter(p=>{
    if(!q) return true;
    return [p.email,p.display_name].some(v=>String(v||"").toLowerCase().includes(q));
  });
  // 也顯示帳本裡有紀錄但沒建帳號的 email
  const knownEmails=new Set(allCounselorProfiles.map(p=>(p.email||"").toLowerCase()));
  const extraEmails=new Set([
    ...(allCreditTx||[]).map(t=>(t.counselor_email||"").toLowerCase()),
    ...(allAuthorizations||[]).map(a=>(a.counselor_email||"").toLowerCase())
  ]);
  [...extraEmails].filter(e=>e&&!knownEmails.has(e)).forEach(e=>{
    if(!q||e.includes(q)) rows.push({email:e,display_name:"",role:"—"});
  });

  const {pageItems,page,totalPages}=paginate(rows,summaryPage,PAGE_SIZE);
  summaryPage=page;

  document.getElementById("summaryRows").innerHTML=rows.length?pageItems.map(p=>{
    const bal=getBalance(p.email);
    const roleLabel={"consultant":"諮詢師","counselor":"諮詢師","pending":"待審核"}[p.role]||"諮詢師";
    return `<tr>
      <td><strong>${esc(p.display_name||"—")}</strong></td>
      <td style="font-size:13px">${esc(p.email)}</td>
      <td><span class="pill">${esc(roleLabel)}</span></td>
      <td style="text-align:center">
        <span class="balance-chip ${balClass(bal)}">${bal} 次</span>
        ${bal===0?`<a class="grant-link" href="plans.html">前往授權 →</a>`:""}
      </td>
      <td>
        <button class="btn" style="padding:4px 10px;font-size:12px"
          onclick="quickAdjust('${escAttr(p.email)}')">手動調整</button>
      </td>
    </tr>`;
  }).join(""):`<tr><td colspan="5" class="empty-state">尚無諮詢師資料。</td></tr>`;

  renderPagination("summaryPagination",page,totalPages,pg=>{summaryPage=pg;renderSummary();});
}

// ── 手動調整 ─────────────────────────────────────────────────────────────────
function populateAdjustDropdown(){
  const sel=document.getElementById("adjustCounselor");
  const cur=sel.value;

  // 已建帳號的諮詢師
  const profileMap=new Map(allCounselorProfiles.map(p=>[(p.email||"").toLowerCase(),p]));

  // 舊資料中有記錄但未建帳號的 email
  const oldEmails=new Set([
    ...(allAuthorizations||[]).map(a=>(a.counselor_email||"").toLowerCase()),
    ...(allCreditTx||[]).map(t=>(t.counselor_email||"").toLowerCase())
  ]);
  oldEmails.forEach(e=>{if(e&&!profileMap.has(e)) profileMap.set(e,{email:e,display_name:"",role:"old"});});

  // 排序：有帳號的優先，再按 email 排
  const sorted=[...profileMap.values()].sort((a,b)=>{
    const aOld=a.role==="old"?1:0;
    const bOld=b.role==="old"?1:0;
    if(aOld!==bOld) return aOld-bOld;
    return (a.email||"").localeCompare(b.email||"");
  });

  sel.innerHTML='<option value="">-- 請選擇諮詢師 --</option>';
  let lastGroup="";
  sorted.forEach(p=>{
    const group=p.role==="old"?"old":"active";
    if(group!==lastGroup){
      if(group==="old") sel.innerHTML+=`<option disabled>── 舊資料（無帳號）──</option>`;
      lastGroup=group;
    }
    const bal=getBalance(p.email);
    const label=p.display_name?`${p.display_name}（${p.email}）`:`${p.email}`;
    sel.innerHTML+=`<option value="${escAttr(p.email)}">${esc(label)}　餘額：${bal}次</option>`;
  });

  if(cur) sel.value=cur;
}
function onAdjustCounselorChange(){ hideMsg("adjustMsg"); }
function quickAdjust(email){
  document.getElementById("adjustCounselor").value=email;
  document.getElementById("adjustCounselor").scrollIntoView({behavior:"smooth",block:"center"});
  document.getElementById("adjustAmount").focus();
}
async function doAdjust(){
  hideMsg("adjustMsg");
  const email=document.getElementById("adjustCounselor").value.trim().toLowerCase();
  const type=document.getElementById("adjustType").value;
  const amount=parseInt(document.getElementById("adjustAmount").value,10)||0;
  const reason=document.getElementById("adjustReason").value.trim();
  if(!email){showMsg("adjustMsg","請選擇諮詢師。",true);return;}
  if(!amount){showMsg("adjustMsg","請輸入不為 0 的數量。",true);return;}
  let delta;
  if(type==="deduct") delta=-Math.abs(amount);
  else if(type==="restore") delta=Math.abs(amount);
  else delta=amount; // adjust 可輸入負數
  const bal=getBalance(email);
  if(type==="deduct"&&delta<0&&bal+delta<0){
    if(!confirm(`注意：${email} 目前餘額 ${bal} 次，扣除後將為負數（${bal+delta}次），確定繼續？`)) return;
  }
  const {data,error}=await sb.from("credit_transactions").insert({
    counselor_email:email,delta,type,
    reason:reason||null,
    created_by:currentSession?.user?.id||null,
    created_by_name:currentProfile?.display_name||null
  }).select("*").single();
  if(error){showMsg("adjustMsg","調整失敗："+error.message,true);return;}
  const sign=delta>0?"+":"";
  showMsg("adjustMsg",`✅ 已完成：${TX_LABELS[type]||type} ${sign}${delta} 次。`,false);
  document.getElementById("adjustAmount").value="1";
  document.getElementById("adjustReason").value="";
  await logAction({actionType:"credit_"+type,targetType:"credit_transaction",targetId:data.id,after:data});
  await loadCreditTx();
  populateAdjustDropdown();
  renderSummary();
  renderTx();
}

// ── 完整帳本 ─────────────────────────────────────────────────────────────────
function onTxSearchChange(){ txPage=1; renderTx(); }
function renderTx(){
  const q=document.getElementById("txSearch").value.trim().toLowerCase();
  const filtered=q?allCreditTx.filter(t=>String(t.counselor_email||"").toLowerCase().includes(q)):allCreditTx;
  const {pageItems,page,totalPages}=paginate(filtered,txPage,PAGE_SIZE);
  txPage=page;
  const counselorMap=Object.fromEntries(allCounselorProfiles.map(p=>[(p.email||"").toLowerCase(),p.display_name||p.email]));
  document.getElementById("txRows").innerHTML=filtered.length?pageItems.map(t=>{
    const sign=t.delta>0?"+":"";
    const cls=TX_CLASS[t.type]||"type-adjust";
    const name=counselorMap[(t.counselor_email||"").toLowerCase()]||"";
    return `<tr>
      <td style="font-size:12px;white-space:nowrap">${esc(fmtTime(t.created_at))}</td>
      <td>
        ${name?`<strong>${esc(name)}</strong><br>`:""}
        <span style="font-size:12px;color:#888">${esc(t.counselor_email)}</span>
      </td>
      <td><span class="type-badge ${cls}">${esc(TX_LABELS[t.type]||t.type)}</span></td>
      <td style="font-weight:700;color:${t.delta>0?"#155724":"#721c24"}">${sign}${esc(t.delta)}</td>
      <td style="font-size:13px">${esc(t.reason||"")}</td>
      <td style="font-size:12px;color:#888">${esc(t.created_by_name||"")}</td>
      <td><button class="btn danger" style="padding:4px 10px;font-size:12px"
        onclick="deleteTx('${escAttr(t.id)}')">刪除</button></td>
    </tr>`;
  }).join(""):`<tr><td colspan="7" class="empty-state">尚無帳本紀錄。</td></tr>`;
  renderPagination("txPagination",page,totalPages,pg=>{txPage=pg;renderTx();});
}
async function deleteTx(id){
  const t=allCreditTx.find(r=>String(r.id)===String(id));
  if(!t){return;}
  const sign=t.delta>0?"+":"";
  if(!confirm(`確定刪除此筆紀錄？\n${t.counselor_email}  ${sign}${t.delta}（${TX_LABELS[t.type]||t.type}）\n\n注意：刪除後此諮詢師餘額將相應變動。`)) return;
  const {error}=await sb.from("credit_transactions").delete().eq("id",id);
  if(error){alert("刪除失敗："+error.message);return;}
  await logAction({actionType:"delete_credit_tx",targetType:"credit_transaction",targetId:id,before:t});
  await loadCreditTx();
  populateAdjustDropdown();
  renderSummary();
  renderTx();
}
</script>
</body>
</html>
