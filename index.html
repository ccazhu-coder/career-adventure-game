  <style>

    .hero-inner{position:relative;z-index:1;display:grid;grid-template-columns:1.45fr .78fr;gap:22px;align-items:stretch}.hero-main{display:flex;flex-direction:column;justify-content:center}

    .topbar{display:flex;gap:14px;align-items:center;justify-content:space-between;margin:18px 0 12px;position:sticky;top:0;z-index:10;background:rgba(243,239,228,.82);backdrop-filter:blur(16px);padding:11px 0}.progress-wrap{flex:1;background:#fff;border:1px solid var(--line);border-radius:999px;overflow:hidden;height:18px;box-shadow:var(--shadow2)}.progress{height:100%;width:0%;background:linear-gradient(90deg,#173F33,#2E6B55,#B8872E);transition:.28s ease}.small{font-size:13px;color:var(--muted)}
    .layout{display:grid;grid-template-columns:282px 1fr;gap:22px;margin-top:18px}.nav{align-self:start;position:sticky;top:68px;background:rgba(255,253,248,.86);border:1px solid var(--line);border-radius:28px;padding:14px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}.nav:before{content:"完整專業版｜262題";display:block;color:#7E6736;background:#FBF2D8;border:1px solid #E8D19A;border-radius:16px;padding:9px 11px;margin:2px 2px 10px;font-size:13px;font-weight:900;text-align:center}.nav button{width:100%;border:0;background:transparent;text-align:left;border-radius:18px;padding:13px 12px;margin:4px 0;color:var(--ink);display:flex;gap:10px;align-items:center;justify-content:space-between;transition:.18s ease}.nav button:hover{background:#F6EFDFFF;transform:translateX(2px)}.nav button.active{background:linear-gradient(135deg,#173F33,#2E6B55);font-weight:900;color:#fff;box-shadow:0 10px 22px rgba(23,63,51,.20)}.nav .dot{width:10px;height:10px;border-radius:50%;background:#D3C5A8;display:inline-block}.nav button.done .dot{background:#2F9C70}.nav button.active .dot{background:#FFE4A7}

    .mission-tip{background:linear-gradient(135deg,#EDF6EE,#FFF7DD);border:1px solid #D8E6D0;color:#254E43;border-radius:22px;padding:15px 17px;margin:16px 0;box-shadow:0 8px 18px rgba(46,107,85,.06);font-size:16px;line-height:1.75}.section-intro{border-radius:26px;padding:20px 22px;margin:0 0 18px;border:1px solid #DCCFB8;box-shadow:0 10px 24px rgba(42,62,49,.07)}.section-intro h3{margin:0 0 8px;font-size:24px;color:#17382F}.section-intro p{margin:0;color:#365247;font-size:16px;line-height:1.8}.section-intro .intro-tag{display:inline-flex;align-items:center;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:1000;letter-spacing:.06em;margin-bottom:12px}.section-intro .intro-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:16px}.section-intro .intro-card{background:rgba(255,255,255,.78);border:1px solid rgba(220,207,184,.9);border-radius:18px;padding:14px 14px 13px}.section-intro .intro-card b{display:block;color:#18382E;font-size:15px;margin-bottom:5px}.section-intro .intro-card span{display:block;color:#52645B;font-size:14px;line-height:1.65}.section-intro.profile{background:linear-gradient(135deg,#F4FBF6,#FFF8E4)}.section-intro.profile .intro-tag{background:#DDEEE2;color:#1D5848}.section-intro.holland{background:linear-gradient(135deg,#F3F8FF,#F8F4FF)}.section-intro.holland .intro-tag{background:#E3ECFF;color:#244B7A}.section-intro.rating{background:linear-gradient(135deg,#FFF8EC,#F8FBFF)}.section-intro.rating .intro-tag{background:#F6E4BE;color:#6B4A0B}.section-intro.super{background:linear-gradient(135deg,#F5F9EF,#FFF7E7)}.section-intro.super .intro-tag{background:#E8F1D8;color:#46602D}.section-intro.result{background:linear-gradient(135deg,#F7F6FF,#EFF8F2)}.section-intro.result .intro-tag{background:#E6E1FF;color:#4B3D8A}details.type-card{background:#fff;border:1px solid var(--line);border-radius:24px;margin:15px 0;overflow:hidden;transition:.2s ease}details.type-card[open]{box-shadow:0 14px 30px rgba(48,77,62,.10     .super-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px;margin:15px 0;box-shadow:0 10px 22px rgba(35,52,44,.045)}.super-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px}.super-head h3{margin:0;font-size:19px;color:var(--dark)}.super-desc{margin:0 0 8px;color:var(--muted);font-size:14px}.actions{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:26px;flex-wrap:wrap}.actions .right{display:flex;gap:10px;flex-wrap:wrap}.btn{border:0;border-radius:999px;padding:12px 18px;font-weight:1000;background:#CDBF9F;color:#17352C;transition:.16s ease}.btn:hover{filter:brightness(.96);transform:translateY(-1px)}.btn.primary{background:linear-gradient(135deg,#143B30,#24624E);color:#fff;box-shadow:0 12px 22px rgba(22,62,50,.25)}.btn.gold{background:linear-gradient(135deg,#805414,#BF8E32);color:#fff}.btn.ghost{background:#F8F2E6;border:1px solid #9E9177;color:#17382F}.btn.danger{background:#8E4A35;color:#fff}.btn:disabled{opacity:.6;cursor:not-allowed;filter:grayscale(.15)}

    .hex-card{display:flex;flex-direction:column;gap:10px}.hex-wrap{display:flex;justify-content:center;align-items:center;padding:8px 0}.hex-svg{width:min(100%,440px);height:auto;display:block}.hex-legend{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.hex-legend .legend-item{display:flex;align-items:flex-start;gap:8px;background:#F7F3EA;border:1px solid var(--line);border-radius:15px;padding:9px 10px;font-size:13px;color:#4B5B53}.legend-badge{width:26px;height:26px;border-radius:999px;background:#E8F0EB;color:var(--green);display:inline-flex;align-items:center;justify-content:center;font-weight:1000;flex:0 0 26px}.counselor-list{display:grid;gap:10px}.counselor-note{background:#F7F3EA;border:1px solid var(--line);border-radius:16px;padding:12px 14px}.counselor-note strong{color:var(--dark)}.report-box{white-space:pre-wrap;background:#102A23;color:#F9EED7;border-radius:24px;padding:19px;max-height:380px;overflow:auto;font-family:"Noto Sans Mono","Consolas",monospace;font-size:14px;box-shadow:inset 0 1px 0 rgba(255,255,255,.07)}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#102A23;color:#fff;border-radius:999px;padding:10px 16px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:99}.toast.show{opacity:1;bottom:28px}.warning{background:#FFF7E4;border:1px solid #F0D59E;color:#6B501E;border-radius:18px;padding:12px 14px;margin:12px 0}.hidden{display:none!important}.email-status{font-size:13px;color:#6C7A72;margin-top:8px}

    .game-bg{position:fixed;inset:0;pointer-events:none;z-index:-1;overflow:hidden}.game-orb{position:absolute;border-radius:999px;filter:blur(.2px);opacity:.32;animation:floatOrb 9s ease-in-out infinite}.game-orb.one{width:140px;height:140px;left:5%;top:18%;background:#F1D18A}.game-orb.two{width:190px;height:190px;right:8%;top:36%;background:#A8D7BC;animation-delay:-2s}.game-orb.three{width:110px;height:110px;left:48%;bottom:8%;background:#C9B7FF;animation-delay:-4s}.spark{position:absolute;width:8px;height:8px;border-radius:50%;background:#D8A63F;opacity:.38;animation:twinkle 2.8s ease-in-out infinite}.spark.s1{left:18%;top:12%}.spark.s2{right:24%;top:18%;animation-delay:.8s}.spark.s3{left:72%;bottom:20%;animation-delay:1.5s}@keyframes floatOrb{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-18px) scale(1.04)}}@keyframes twinkle{0%,100%{transform:scale(.65);opacity:.22}50%{transform:scale(1.25);opacity:.65}}@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}@keyframes popSelect{0%{transform:scale(.96)}55%{transform:scale(1.06)}100%{transform:scale(1)}}.panel{animation:slideUp .38s ease both}.hero-card strong{animation:twinkle 3s ease-in-out infinite}.q-row,.rating-row,.type-card,.super-card,.result-card,.rank-item{transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}.q-row:hover,.rating-row:hover{transform:translateX(4px);background:linear-gradient(90deg,rgba(46,107,85,.045),rgba(241,209,138,.05));border-radius:14px;padding-left:10px;padding-right:10px}.choice button.selected,.rating-buttons button.active{animation:popSelect .24s ease}.progress{background-size:180% 100%;animation:xpFlow 2.8s linear infinite}@keyframes xpFlow{0%{background-position:0% 50%}100%{background-position:180% 50%}}.access-card{background:linear-gradient(135deg,#FFF8E7,#EFF8F2);border:1px solid #DCCFB8;border-radius:24px;padding:18px;margin:16px 0;box-shadow:0 10px 24px rgba(42,62,49,.07)}.access-card h3{margin:0 0 8px;color:#17382F;font-size:22px}.access-grid{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end}.access-status{margin-top:10px;border-radius:14px;padding:10px 12px;font-weight:800}.access-status.warn{background:#FFF6DD;color:#6B501E;border:1px solid #EED393}.access-status.ok{background:#E8F6EE;color:#23684E;border:1px solid #BFDCCB}.access-status.bad{background:#FFEDE8;color:#8E4A35;border:1px solid #E9B8A9}.code-chip{display:inline-flex;align-items:center;gap:8px;background:#102A23;color:#FFE9B5;border-radius:999px;padding:8px 13px;font-weight:1000;letter-spacing:.06em}.game-stage-label{display:inline-flex;gap:8px;align-items:center;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:7px 12px;margin-top:14px;color:#FFE8AC;font-weight:900}.pdf-safe *{box-sizing:border-box;overflow-wrap:anywhere;word-break:break-word}.pdf-avoid{break-inside:avoid;page-break-inside:avoid}

    @media (max-width:900px){.hero-inner,.layout,.result-hero{grid-template-columns:1fr}.nav{position:relative;top:auto;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}.nav:before{grid-column:1/-1}.topbar{position:relative}.grid2,.grid3,.rank-list,.hex-legend,.section-intro .intro-grid{grid-template-columns:1fr}.q-row,.rating-row{grid-template-columns:1fr}.choice,.rating-buttons{justify-content:flex-start}.app{padding:14px 12px 56px}.hero{padding:24px}.section-head{flex-direction:column}.panel{padding:18px}.code{font-size:50px}}

async function fetchBatchByShortCode(code){
  const url=SUPABASE_URL+'/rest/v1/batches?short_code=eq.'+encodeURIComponent(code)+'&select=*';
  const res=await fetch(url,{headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY}});
  if(!res.ok) throw new Error('系統連線失敗，請稍後再試');
  const rows=await res.json();
  if(!rows.length) throw new Error('短碼不存在，請確認連結是否正確');
  return rows[0];
}
function validateBatchForSubmission(batch){
  if(String(batch.status||'啟用')!=='啟用') throw new Error('此批次目前未啟用');
  const now=new Date();
  if(batch.start_time && now < new Date(batch.start_time)) throw new Error('此批次尚未開始');
  if(batch.end_time && now > new Date(batch.end_time)) throw new Error('此批次已結束');
  if((batch.quantity||0) > 0 && (batch.completed_count||0) >= batch.quantity) throw new Error('此批次名額已滿');
  if(!validEmail(batch.counselor_email||'')) throw new Error('批次缺少有效的諮詢師 Email');
  return batch;
}

async function verifyAccessCode(showAlert=false){
  const code=getShortCode();
  if(!code){if(showAlert) alert('請輸入或使用專屬短碼連結，例如 ?c=K8P2QX');return false;}
  state.profile.accessCode=code;
  if(PREVIEW_MODE){accessVerified=true;accessInfo={shortCode:code,batchCode:'PREVIEW',batchName:'預覽模式',serial:'000',consultantEmail:'',status:'已驗證',message:'預覽模式已允許進入'};render();return true;}
  if(!isSupabaseReady()){
    accessInfo={shortCode:code,status:'驗證失敗',message:'系統尚未完成短碼驗證設定，請稍後再試'};
    render();
    if(showAlert) alert('系統尚未完成短碼驗證設定，請稍後再試。');
    return false;
  }
  try{
    accessInfo={shortCode:code,status:'驗證中',message:'正在確認短碼與可測驗時間...'};render();

    accessVerified=true;
    accessInfo={shortCode:batch.short_code||code,batchCode:batch.batch_code||'',batchName:batch.batch_name||'',serial:String((Number(batch.completed_count)||0)+1).padStart(3,'0'),consultantEmail:batch.counselor_email||'',status:'已驗證',message:'短碼已通過驗證'};
    render();
    return true;
  }catch(err){
    accessVerified=false;
    accessInfo={shortCode:code,status:'驗證失敗',message:err.message || '短碼驗證失敗'};
    render();
    if(showAlert) alert('短碼驗證失敗：' + (err.message || '請確認連結或聯絡服務人員'));
    return false;
  }
}

function barRow(key,label,score,max){return `<div class="bar-row"><div class="bar-label">${escapeHtml(label)}</div><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,Math.round(score/max*100))}%"></div></div><div class="score-num">${score}</div></div>`;}
function makeReport(h,s){
  const role=careerRoleTitle(h,s), top3=h.ranking.slice(0,3), values=s.ranking.slice(0,5);
  const lines=[];
  lines.push('知己知途｜職涯探索冒險遊戲｜正式個案報告');
  lines.push('');
  lines.push(`姓名/暱稱：${state.profile.name || '未填'}`);
  lines.push(`Email：${state.profile.email || '未填'}`);
  lines.push(`測試日期：${state.profile.date || '未填'}`);
  lines.push(`任務序號：${accessInfo.serial || '未提供'}`);
  const ideals=state.profile.ideals.filter(Boolean); if(ideals.length) lines.push(`理想職業：${ideals.join('、')}`);
  lines.push('');
  lines.push(`一、職涯角色總覽：${role}`);
  lines.push(`何倫 RIASEC 代碼：${h.code}`);
  lines.push(`前三高：${top3.map(x=>x.type+'型'+x.meta.name+'（'+x.score+'分）').join('、')}`);
  lines.push('');
  lines.push('二、SUPER 工作價值觀前五高');
  values.forEach((v,i)=>lines.push(`${i+1}. ${v.name}：${v.score}分｜${v.desc}`));
  lines.push('');
  lines.push('三、適合的工作環境');
  suitedEnvironment(h,s).forEach((x,i)=>lines.push(`${i+1}. ${x}`));
  lines.push('');
  lines.push('四、可能卡住的地方');
  possibleBlocks(h,s).forEach((x,i)=>lines.push(`${i+1}. ${x}`));
  lines.push('');
  lines.push('五、延伸探索重點');
  counselorFocus(h,s).forEach((x,i)=>lines.push(`${i+1}. ${x}`));
  lines.push('');
  lines.push('六、下一步行動建議');
  nextActionAdvice(h,s).forEach((x,i)=>lines.push(`${i+1}. ${x}`));
  lines.push('');
  lines.push('提醒：本結果用於職涯探索與課程討論，不等同於診斷或唯一職業建議。');
  return lines.join('\n');
}

function pdfFileName(){

async function createPdfBlob(){
  if(!window.html2pdf) throw new Error('PDF 功能尚未載入，請確認網路連線或改用列印另存 PDF。');
  const el=document.createElement('div');
  el.innerHTML=pdfReportHtml();
  el.style.position='fixed';el.style.left='-99999px';el.style.top='0';el.style.width='170mm';el.style.maxWidth='170mm';el.style.background='#fff';el.style.boxSizing='border-box';el.style.overflowWrap='anywhere';
  document.body.appendChild(el);
  try{
    const opt={margin:[12,12,12,12],filename:pdfFileName(),image:{type:'jpeg',quality:.98},html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff',scrollX:0,scrollY:0},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy'],avoid:['.pdf-avoid','.result-card','.rank-item','.counselor-note']}};
    return await html2pdf().set(opt).from(el).outputPdf('blob');
  }finally{el.remove();}
}
function blobToBase64(blob){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onloadend=()=>resolve(String(reader.result).split(',')[1]);reader.onerror=reject;reader.readAsDataURL(blob);});}
async function downloadPdf(btn){

  try{
    if(!window.html2pdf){window.print();return;}
    const el=document.createElement('div');el.innerHTML=pdfReportHtml();el.style.width='170mm';el.style.maxWidth='170mm';el.style.background='#fff';el.style.boxSizing='border-box';document.body.appendChild(el);
    const opt={margin:[12,12,12,12],filename:pdfFileName(),image:{type:'jpeg',quality:.98},html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff',scrollX:0,scrollY:0},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy'],avoid:['.pdf-avoid','.result-card','.rank-item','.counselor-note']}};
    await html2pdf().set(opt).from(el).save();el.remove();toast('PDF 已產生');
  }catch(err){console.error(err);alert('PDF 產生失敗，請改用瀏覽器列印／另存 PDF。');}

function buildResultRecord(h,s,fileName,status){
  const record={};
  const pct=Math.round(answeredCount()/totalCount()*100)+'%';
  const ideals=state.profile.ideals || [];
  const top3=h.ranking.slice(0,3).map(x=>x.type);
  const valueTop=s.ranking.slice(0,2);
  const valueLow=s.low.slice(0,2);
  record['時間戳記']=new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'});
  record['測驗批次ID']=accessInfo.batchCode || getShortCode() || SESSION_ID;
  record['填答序號']=accessInfo.serial || ''; 
  record['批次碼']=accessInfo.batchCode || '';
  record['批次名稱']=accessInfo.batchName || '';
  record['短碼']=getShortCode() || '';
  record['諮詢師Email']=accessInfo.consultantEmail || '';
  record['姓名/暱稱']=state.profile.name || '';
  record['性別']=state.profile.gender || '';
  record['年齡']=state.profile.age || '';
  record['電話']=state.profile.phone || '';
  record['Email']=state.profile.email || '';
  record['測試日期']=state.profile.date || '';
  record['理想職業1']=ideals[0] || '';
  record['理想職業2']=ideals[1] || '';
  record['理想職業3']=ideals[2] || '';
  record['完成題數']=answeredCount();
  record['總題數']=totalCount();
  record['完成率']=pct;
  record['荷倫代碼']=h.code || '';
  record['主型']=top3[0] || '';
  record['次型']=top3[1] || '';
  record['第三型']=top3[2] || '';
  TYPES.forEach(t=>{record[t+'總分']=h.scores[t] || 0;});
  TYPES.forEach(t=>{record[t+'興趣活動分數']=(h.breakdown[t]&&h.breakdown[t].interest)||0;});
  TYPES.forEach(t=>{record[t+'勝任能力分數']=(h.breakdown[t]&&h.breakdown[t].ability)||0;});
  TYPES.forEach(t=>{record[t+'職業偏好分數']=(h.breakdown[t]&&h.breakdown[t].career)||0;});
  TYPES.forEach(t=>{record[t+'能力簡評A分數']=(h.breakdown[t]&&h.breakdown[t].abilityA)||0;});
  TYPES.forEach(t=>{record[t+'能力簡評B分數']=(h.breakdown[t]&&h.breakdown[t].abilityB)||0;});
  s.rows.forEach(v=>{record[v.id+v.name]=v.score;});
  record['價值觀第1名']=valueTop[0] ? `${valueTop[0].name}（${valueTop[0].score}分）` : '';
  record['價值觀第2名']=valueTop[1] ? `${valueTop[1].name}（${valueTop[1].score}分）` : '';
  record['低優先第1名']=valueLow[0] ? `${valueLow[0].name}（${valueLow[0].score}分）` : '';
  record['低優先第2名']=valueLow[1] ? `${valueLow[1].name}（${valueLow[1].score}分）` : '';
  const counselorReport=makeCounselorReport(h,s);
  record['諮詢師專用分析']=counselorReport;
  record['諮詢師個案摘要']=counselorCaseSummary(h,s).join('\n');
  record['諮詢師報告撰寫方向']=counselorWritingDirections(h,s).join('\n');
  record['諮詢師晤談追問']=counselorInterviewQuestions(h,s).join('\n');
  record['諮詢師報告句型']=counselorProfessionalPhrases(h,s).join('\n');
  record['PDF檔名']=fileName || pdfFileName();
  record['個案報告連結']='後台產生中';
  record['PDF寄送狀態']=status || '待寄送';
  record['PDF寄送時間']='';
  record['PDF錯誤訊息']='';
  record['測驗來源網址']=location.href;
  record['使用裝置/瀏覽器']=navigator.userAgent;
  record['原始答案JSON']=JSON.stringify({questionBankVersion:QUESTION_BANK_VERSION,shortCode:getShortCode(),accessInfo,profile:state.profile,holland:state.holland,abilityA:state.abilityA,abilityB:state.abilityB,super:state.super});
  record['諮詢師備註']=QUESTION_BANK_VERSION + '｜短碼：' + (getShortCode() || '') + '｜諮詢師：' + (accessInfo.consultantEmail || '');
  return record;
}
async function sendPdfToEmail(btn,silent=false){
  if(!validateProfile(!silent)) return false;
  if(!isSupabaseReady()){
    setEmailSendState('warn','尚未寄送報告','目前無法自動寄送 Email，可先下載 PDF。');
    if(!silent) alert('目前無法自動寄送 Email，可先下載 PDF。');
    return false;
  }
  const old=btn?.textContent;if(btn){btn.disabled=true;btn.textContent='PDF寄送中...';}
  try{
    setEmailSendState('warn','PDF 產生與寄送中','系統正在產生正式 PDF，請不要關閉頁面。');
    const pdfBlob=await createPdfBlob();const pdfBase64=await blobToBase64(pdfBlob);const h=calcHolland(),s=calcSuper();
    const fileName=pdfFileName();
    const payload={shortCode:getShortCode(),batchShortCode:getShortCode(),accessInfo,email:String(state.profile.email||'').trim(),name:String(state.profile.name||'學員').trim(),fileName,subject:'知己知途｜職涯探索冒險遊戲正式個案報告',pdfBase64,reportText:makeReport(h,s),counselorReportText:makeCounselorReport(h,s),hollandCode:h.code,topValues:s.ranking.slice(0,2).map(v=>v.name).join('、'),sentAt:new Date().toISOString(),record:buildResultRecord(h,s,fileName,'待寄送')};
    const res=await fetch(SUBMIT_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json',apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY},body:JSON.stringify(payload)});
    const data=await res.json().catch(()=>({}));
    if(!res.ok || data.ok===false) throw new Error(data.error || '寄送失敗，請稍後再試。');
    setEmailSendState('ok','PDF 已寄送',`系統已將報告寄到 ${payload.email}。若幾分鐘內沒有收到，請先檢查垃圾信件。`);
    toast('PDF 已寄送');
    if(!silent) alert(`已將 PDF 寄送到：${payload.email}
若沒有收到，請先檢查垃圾信件。`);
    return true;
  }catch(err){
    console.error(err);
    setEmailSendState('bad','PDF 寄送失敗',err.message || '請確認網路連線，稍後再試。');
    if(!silent) alert('PDF 寄送失敗：' + (err.message || '請確認網路連線，稍後再試。'));
    return false;
  }finally{if(btn){btn.disabled=false;btn.textContent=old;}}
}

function copyReport(){const text=document.getElementById('reportText')?.innerText || makeReport(calcHolland(),calcSuper());navigator.clipboard.writeText(text).then(()=>toast('報告已複製')).catch(()=>toast('無法複製，請手動選取'));}
function resetGame(){if(confirm('確定要清除目前填答並重新開始嗎？')){cleanupPersistentStorage();state=emptyState();current='profile';accessVerified=false;accessInfo={shortCode:SHORT_CODE_FROM_URL,batchCode:'',batchName:'',serial:'',consultantEmail:'',status:'尚未驗證',message:'請先驗證專屬短碼'};emailSendAttempted=false;emailSendState={kind:'warn',title:'尚未寄送報告',text:'完成測驗後，可下載 PDF 或寄送到你的 Email。'};render();toast('已清空並重新開始');}}
function escapeHtml(s){return String(s ?? '').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
render();
