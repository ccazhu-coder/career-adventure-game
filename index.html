  const top=h.ranking[0], top3=h.ranking.slice(0,3), values=s.ranking.slice(0,2), lows=s.low.slice(0,2);

  view.innerHTML=`<div class="section-head"><div><h2>🏆 完整專業版結果報告</h2><p>含何倫碼六角型圖、RIASEC 六型分數、SUPER 價值觀排序與諮詢師快速判讀。</p></div><span class="pill">${complete?'完整報告':'尚有未答題'}</span></div>
  ${complete?'':`<div class="warning">⚠️ 目前還有 ${totalCount()-answeredCount()} 題未完成，系統已依現有答案試算。建議補完後再列印正式報告。</div>`}
  <div class="result-hero"><div class="result-card"><h2>${state.profile.name?escapeHtml(state.profile.name)+' 的':''}職涯角色</h2><div class="code">${h.code || '---'}</div><p>${top.meta.emoji} 主型：${top.type} 型｜${top.meta.name}｜${top.meta.role}</p><p style="margin-top:10px">工作價值觀優先：${values.map(v=>v.emoji+' '+v.name).join('、')}</p></div>
  <div class="sub-card"><h3>報告摘要</h3><p><strong>興趣/能力主軸：</strong>${top3.map(x=>`${x.type}型${x.meta.name}`).join(' → ')}</p><p><strong>決策關鍵：</strong>${values.map(v=>v.name).join('、')}</p><p><strong>低優先提醒：</strong>${lows.map(v=>v.name).join('、')} 目前可能不是你最在意的工作條件。</p></div></div>
  <div class="rank-list"><div class="sub-card hex-card"><h3>何倫碼六角型圖</h3><p class="small">依 R→I→A→S→E→C 排列；越外圈代表分數越高，越容易成為自然偏好的工作風格。</p><div class="hex-wrap">${renderHollandHexSvg(h.scores,{size:400})}</div><div class="hex-legend">${top3.map((x,i)=>`<div class="legend-item"><span class="legend-badge">${i+1}</span><div><strong>${x.type} 型｜${x.meta.name}</strong><br><span>${x.meta.role}</span></div></div>`).join('')}</div></div>
  <div class="sub-card"><h3>諮詢師快速判讀</h3><div class="counselor-list">${hints.map((txt,i)=>`<div class="counselor-note"><strong>${i+1}.</strong> ${escapeHtml(txt)}</div>`).join('')}</div></div></div>
  <div class="rank-list"><div class="sub-card"><h3>RIASEC 六型分數</h3>${TYPES.map(t=>barRow(t,DATA.riasec[t].emoji+' '+t+' '+DATA.riasec[t].name,h.scores[t],hollandTypeMax(t))).join('')}</div>
  <div class="sub-card"><h3>SUPER 價值觀分數</h3>${s.ranking.map(v=>barRow(v.id,v.emoji+' '+v.name,v.score,20)).join('')}</div></div>
  <div class="rank-list">${top3.map((x,i)=>`<div class="rank-item"><h3>${i+1}. ${x.meta.emoji} ${x.type} 型｜${x.meta.name}</h3><p>${escapeHtml(x.meta.desc)}</p><p style="margin-top:8px"><strong>行動建議：</strong>${escapeHtml(x.meta.advice)}</p></div>`).join('')}${values.map((v,i)=>`<div class="rank-item"><h3>${i+1}. ${v.emoji} 價值觀｜${v.name}</h3><p>${escapeHtml(v.desc)}</p></div>`).join('')}</div>
  <h3>可複製報告</h3><div class="report-box" id="reportText">${escapeHtml(report)}</div>
  <div id="emailSendStatus" class="email-send-box ${emailSendState.kind}">${emailSendStatusHtml()}</div>
  <div class="actions"><div class="left"><button class="btn ghost" onclick="prevStep()">← 回上一關</button></div><div class="right"><button class="btn gold" onclick="copyReport()">複製報告</button><button class="btn ghost" onclick="downloadPdf(this)">下載 PDF</button><button class="btn primary" onclick="sendPdfToEmail(this,false)">寄送 PDF 到 Email</button><button class="btn danger" onclick="resetGame()">重新測驗</button></div></div>`;
  scheduleAutoEmailSend(complete);
}
function barRow(key,label,score,max){return `<div class="bar-row"><div class="bar-label">${escapeHtml(label)}</div><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,Math.round(score/max*100))}%"></div></div><div class="score-num">${score}</div></div>`;}
function makeReport(h,s){
  const lines=[];
  lines.push('職涯冒險島｜荷倫興趣 × SUPER 工作價值觀結果報告');
  lines.push('');
  lines.push(`姓名/暱稱：${state.profile.name || '未填'}`);
  lines.push(`Email：${state.profile.email || '未填'}`);
  lines.push(`測試日期：${state.profile.date || '未填'}`);
  const ideals=state.profile.ideals.filter(Boolean); if(ideals.length) lines.push(`理想職業：${ideals.join('、')}`);
  lines.push('');
  lines.push(`一、荷倫 RIASEC 職業傾向代碼：${h.code}`);
  h.ranking.forEach((r,i)=>lines.push(`${i+1}. ${r.type}型 ${r.meta.name}：${r.score}分`));
  lines.push('');
  lines.push('二、SUPER 工作價值觀排序');
  s.ranking.forEach((v,i)=>lines.push(`${i+1}. ${v.name}：${v.score}分`));
  lines.push('');
  lines.push(`三、初步解讀：你的職涯探索可優先從「${h.ranking.slice(0,3).map(x=>x.meta.name).join('、')}」相關任務開始，並在選工作時優先檢查「${s.ranking.slice(0,2).map(v=>v.name).join('、')}」是否被滿足。`);
  lines.push('');
  lines.push('四、諮詢師快速判讀');
  counselorHints(h,s).forEach((txt,i)=>lines.push(`${i+1}. ${txt}`));
  lines.push('');
  lines.push('提醒：本結果用於職涯探索與課程討論，不等同於診斷或唯一職業建議。');
  return lines.join('\n');
}

function pdfReportHtml(){
  const h=calcHolland(), s=calcSuper();
  const report=makeReport(h,s);
  const top=h.ranking[0] || {type:'-', meta:{name:'-', role:'-'}};
  const top3=h.ranking.slice(0,3);
  const hints=counselorHints(h,s);
  return `<div style="font-family:'Noto Sans TC','Microsoft JhengHei',Arial,sans-serif;color:#1F2F29;padding:24px;line-height:1.62;background:#fff;">
    <div style="border-bottom:4px solid #173F33;padding-bottom:12px;margin-bottom:16px;">
      <div style="font-size:14px;color:#7A6A4D;font-weight:800;">職涯冒險島｜完整專業版｜荷倫興趣 × SUPER 工作價值觀</div>
      <h1 style="margin:6px 0 4px;font-size:28px;color:#173F33;">${escapeHtml(state.profile.name || '學員')} 的測驗結果報告</h1>
      <div style="font-size:13px;color:#6C7A72;">Email：${escapeHtml(state.profile.email || '')}　｜　測試日期：${escapeHtml(state.profile.date || '')}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;">
      <div style="background:#F6F1E5;border:1px solid #DED2B8;border-radius:16px;padding:16px;">
        <div style="font-size:15px;color:#6C7A72;font-weight:800;">RIASEC 職涯代碼</div>
        <div style="font-size:52px;font-weight:1000;color:#173F33;letter-spacing:.12em;">${escapeHtml(h.code || '---')}</div>
        <div style="font-weight:800;">主型：${escapeHtml(top.type)} 型｜${escapeHtml(top.meta.name)}｜${escapeHtml(top.meta.role)}</div>
        <div style="margin-top:8px;font-size:14px;">工作價值觀優先：${escapeHtml(s.ranking.slice(0,2).map(v=>v.name).join('、'))}</div>
      </div>
      <div style="background:#FCFAF4;border:1px solid #DED2B8;border-radius:16px;padding:12px;">
        <div style="font-size:16px;font-weight:900;color:#173F33;margin-bottom:6px;">何倫碼六角型圖</div>
        <div style="display:flex;justify-content:center;">${renderHollandHexSvg(h.scores,{size:320})}</div>
      </div>
    </div>
    <div style="margin-top:16px;background:#FCFAF4;border:1px solid #DED2B8;border-radius:16px;padding:14px;">
      <div style="font-size:18px;font-weight:900;color:#173F33;margin-bottom:8px;">諮詢師快速判讀</div>
      ${hints.map((txt,i)=>`<div style="margin:6px 0;padding:8px 10px;border-radius:12px;background:#fff;border:1px solid #E5D8C2;"><strong>${i+1}.</strong> ${escapeHtml(txt)}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px;align-items:start;">
      <div style="background:#FCFAF4;border:1px solid #DED2B8;border-radius:16px;padding:14px;">
        <div style="font-size:18px;font-weight:900;color:#173F33;margin-bottom:8px;">RIASEC 前三型</div>
        ${top3.map((x,i)=>`<div style="margin:8px 0;padding:10px 12px;border-radius:12px;background:#fff;border:1px solid #E5D8C2;"><strong>${i+1}. ${x.type} 型｜${x.meta.name}</strong><br><span style="font-size:13px;color:#5D6D66;">${escapeHtml(x.meta.desc)}</span></div>`).join('')}
      </div>
      <div style="background:#FCFAF4;border:1px solid #DED2B8;border-radius:16px;padding:14px;">
        <div style="font-size:18px;font-weight:900;color:#173F33;margin-bottom:8px;">完整分數摘要</div>
        <pre style="white-space:pre-wrap;font-family:'Microsoft JhengHei',Arial,sans-serif;background:#fff;border:1px solid #E5D8C2;border-radius:12px;padding:12px;font-size:12px;line-height:1.55;">${escapeHtml(report)}</pre>
      </div>
    </div>
    <div style="margin-top:16px;font-size:12px;color:#6C7A72;border-top:1px solid #E4DAC7;padding-top:12px;">提醒：本結果用於職涯探索與課程討論，不等同於診斷或唯一職業建議。</div>
  </div>`;
}
function pdfFileName(){
  const name=String(state.profile.name||'學員').trim().replace(/[\\/:*?"<>|\s]+/g,'_');
  const date=String(state.profile.date||new Date().toISOString().slice(0,10));
  return `職涯冒險島完整專業版測驗結果_${name}_${date}.pdf`;
}
function createVisualPdfElement(){
  const source=document.getElementById('view');
  const el=document.createElement('div');
  el.className='pdf-export';
  el.innerHTML=source?.innerHTML || pdfReportHtml();
  el.querySelectorAll('.actions,#emailSendStatus,.email-send-box').forEach(node=>node.remove());
  return el;
}
async function createPdfBlob(){
  if(!window.html2pdf) throw new Error('PDF套件尚未載入，請確認網路連線或改用列印另存PDF。');
  const el=createVisualPdfElement();
  document.body.appendChild(el);
  try{
    const opt={margin:8,filename:pdfFileName(),image:{type:'jpeg',quality:.98},html2canvas:{scale:2,useCORS:true,backgroundColor:'#FFFDF8',windowWidth:1100,scrollX:0,scrollY:0},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy'],avoid:['.result-card','.sub-card','.rank-item','.counselor-note']}};
    return await html2pdf().set(opt).from(el).outputPdf('blob');
  }finally{el.remove();}
}
function blobToBase64(blob){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onloadend=()=>resolve(String(reader.result).split(',')[1]);reader.onerror=reject;reader.readAsDataURL(blob);});}
async function downloadPdf(btn){
  const old=btn?.textContent;if(btn){btn.disabled=true;btn.textContent='PDF產生中...';}
  try{
    if(!window.html2pdf){window.print();return;}
    const el=createVisualPdfElement();document.body.appendChild(el);
    const opt={margin:8,filename:pdfFileName(),image:{type:'jpeg',quality:.98},html2canvas:{scale:2,useCORS:true,backgroundColor:'#FFFDF8',windowWidth:1100,scrollX:0,scrollY:0},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['css','legacy'],avoid:['.result-card','.sub-card','.rank-item','.counselor-note']}};
    await html2pdf().set(opt).from(el).save();el.remove();toast('PDF 已產生');
  }catch(err){console.error(err);alert('PDF 產生失敗，請改用瀏覽器列印／另存 PDF。');}
  finally{if(btn){btn.disabled=false;btn.textContent=old;}}
}
function buildResultRecord(h,s,fileName,status){
  const top3=h.ranking.slice(0,3);
  const valueTop=s.ranking.slice(0,2);
  const valueLow=s.low.slice(0,2);
  const ideals=state.profile.ideals || [];
  const ans=answeredCount(), total=totalCount();
  const record={};
  record['送出時間']=new Date().toISOString();
  record['姓名']=state.profile.name || '';
  record['性別']=state.profile.gender || '';
  record['年齡']=state.profile.age || '';
  record['電話']=state.profile.phone || '';
  record['Email']=state.profile.email || '';
  record['測驗日期']=state.profile.date || '';
  record['理想職業1']=ideals[0] || '';
  record['理想職業2']=ideals[1] || '';
  record['理想職業3']=ideals[2] || '';
  record['已完成題數']=ans;
  record['總題數']=total;
  record['完成率']=total ? Math.round(ans/total*100) : 0;
  record['何倫碼']=h.code || '';
  record['第一型']=top3[0] ? `${top3[0].type} ${top3[0].meta.name}` : '';
  record['第二型']=top3[1] ? `${top3[1].type} ${top3[1].meta.name}` : '';
  record['第三型']=top3[2] ? `${top3[2].type} ${top3[2].meta.name}` : '';
  TYPES.forEach(t=>{record[`${t}總分`]=h.scores[t] || 0;});
  TYPES.forEach(t=>{record[`${t}興趣分數`]=(h.breakdown[t]&&h.breakdown[t].interest)||0;});
  TYPES.forEach(t=>{record[`${t}能力分數`]=(h.breakdown[t]&&h.breakdown[t].ability)||0;});
  TYPES.forEach(t=>{record[`${t}職業分數`]=(h.breakdown[t]&&h.breakdown[t].career)||0;});
  TYPES.forEach(t=>{record[`${t}能力A分數`]=(h.breakdown[t]&&h.breakdown[t].abilityA)||0;});
  TYPES.forEach(t=>{record[`${t}能力B分數`]=(h.breakdown[t]&&h.breakdown[t].abilityB)||0;});
  s.rows.forEach(v=>{record[`SUPER_${v.id}_${v.name}`]=v.score;});
  record['價值觀第一']=valueTop[0] ? `${valueTop[0].name}：${valueTop[0].score}` : '';
  record['價值觀第二']=valueTop[1] ? `${valueTop[1].name}：${valueTop[1].score}` : '';
  record['低優先提醒1']=valueLow[0] ? `${valueLow[0].name}：${valueLow[0].score}` : '';
  record['低優先提醒2']=valueLow[1] ? `${valueLow[1].name}：${valueLow[1].score}` : '';
  record['PDF檔名']=fileName || pdfFileName();
  record['PDF寄送狀態']=status || '待寄送';
  record['PDF寄送時間']='';
  record['PDF錯誤訊息']='';
  record['測驗頁網址']=location.href;
  record['瀏覽器資訊']=navigator.userAgent;
  record['原始答案JSON']=JSON.stringify({profile:state.profile,holland:state.holland,abilityA:state.abilityA,abilityB:state.abilityB,super:state.super});
  record['備註']='';
  return record;
}
async function sendPdfToEmail(btn,silent=false){
  if(!validateProfile(!silent)) return false;
  const recipient=normalizedEmail();
  if(hasEmailPdfBeenSent(recipient)){
    emailSendAttempted=true;
    setEmailSendState('ok','PDF 已寄送過',`系統已經寄送過一次到 ${recipient}，為避免重複寄信，本次不會再送出；可直接下載 PDF 備份。`);
    if(!silent) alert(`這個 Email 已經寄送過一次：${recipient}\n\n為避免重複寄信，系統不會再送出第二封。`);
    return false;
  }
  const endpoint=getEmailEndpoint();
  if(!isEmailEndpointReady()){
    setEmailSendState('warn','寄信後台尚未設定','請先部署 Google Apps Script，並把 Web App URL 貼到 HTML 的 EMAIL_SEND_ENDPOINT，或用網址參數 emailEndpoint 帶入。');
    if(!silent) alert('尚未設定寄信後台。請先部署 Google Apps Script，並把 Web App URL 貼到 HTML 裡的 EMAIL_SEND_ENDPOINT。');
    return false;
  }
  const old=btn?.textContent;if(btn){btn.disabled=true;btn.textContent='PDF寄送中...';}
  try{
    setEmailSendState('warn','PDF 產生與寄送中','系統正在產生正式 PDF，並送出寄信請求，請不要關閉頁面。');
    const pdfBlob=await createPdfBlob();const pdfBase64=await blobToBase64(pdfBlob);const h=calcHolland(),s=calcSuper();
    const fileName=pdfFileName();
    const payload={email:String(state.profile.email||'').trim(),name:String(state.profile.name||'學員').trim(),fileName,subject:'職涯冒險島｜完整專業版測驗結果 PDF',pdfBase64,reportText:makeReport(h,s),hollandCode:h.code,topValues:s.ranking.slice(0,2).map(v=>v.name).join('、'),sentAt:new Date().toISOString(),record:buildResultRecord(h,s,fileName,'待寄送')};
    await fetch(endpoint,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    markEmailPdfSent(recipient);
    setEmailSendState('ok','PDF 寄送請求已送出',`系統已送出寄送請求到 ${payload.email}。若幾分鐘內沒有收到，請檢查垃圾信件或 Apps Script 部署權限。`);
    toast('已送出寄送請求');
    if(!silent) alert(`已送出 PDF 寄送請求到：${payload.email}
若沒有收到，請確認 Apps Script 是否部署成功，或檢查垃圾信件。`);
    return true;
  }catch(err){
    console.error(err);
    setEmailSendState('bad','PDF 寄送失敗',err.message || '請確認網路、PDF 套件與 Apps Script Web App URL。');
    if(!silent) alert('PDF 寄送失敗：' + (err.message || '請確認網路、PDF套件與 Apps Script Web App URL。'));
    return false;
  }finally{if(btn){btn.disabled=false;btn.textContent=old;}}
}

function copyReport(){const text=document.getElementById('reportText')?.innerText || makeReport(calcHolland(),calcSuper());navigator.clipboard.writeText(text).then(()=>toast('報告已複製')).catch(()=>toast('無法複製，請手動選取'));}
function resetGame(){if(confirm('確定要清除目前填答並重新開始嗎？')){cleanupPersistentStorage();state=emptyState();current='profile';emailSendAttempted=false;emailSendState={kind:'warn',title:'寄信後台尚未設定',text:'完成測驗後可先下載 PDF；部署 Apps Script 並貼上 Web App URL 後，才會自動寄送 PDF。'};render();toast('已清空並重新開始');}}
function escapeHtml(s){return String(s ?? '').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
render();
</script>
