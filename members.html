<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>學員檔案｜管理後台｜知己知途</title>
  <link rel="stylesheet" href="admin-layout.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    .repeat-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;background:#d4edda;color:#155724;}
    .cnt-badge{color:#888;font-size:13px;}

    /* 展開按鈕 */
    .expand-btn{background:#f0ead8;border:1px solid #d4c9a0;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;white-space:nowrap;}
    .expand-btn:hover{background:#e5dcbf;}
    .expand-btn.open{background:#3a2e00;color:#fff;border-color:#3a2e00;}

    /* 展開的測驗明細列 */
    .detail-row td{padding:0 !important;}
    .detail-inner{padding:0 16px 14px 48px;border-bottom:2px solid #e8dfc0;}
    .detail-info{font-size:12px;color:#888;margin-bottom:8px;}
    .inner-table{width:100%;border-collapse:collapse;font-size:13px;}
    .inner-table th{background:#f8f3e6;text-align:left;padding:5px 10px;border-bottom:1px solid #d4c9a0;font-weight:600;color:#4a3c00;}
    .inner-table td{padding:6px 10px;border-bottom:1px solid #f0ead8;vertical-align:middle;}
    .inner-table tr:last-child td{border-bottom:none;}
    .test-code{font-weight:700;font-size:14px;letter-spacing:.5px;}
    .no-tests{color:#bbb;font-size:13px;padding:10px 0;}

    /* 姓名行內編輯 */
    .name-input{width:120px;padding:3px 6px;border:1px solid #b8860b;border-radius:4px;font-size:14px;}
    .icon-btn{background:none;border:none;cursor:pointer;padding:2px 4px;font-size:13px;color:#7a5c00;}
    .icon-btn:hover{color:#b8860b;}
    .icon-btn.green{color:#155724;}
    .icon-btn.red{color:#721c24;}

    /* filter-row */
    .filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
    .filter-row select,.filter-row input{height:36px;padding:0 10px;border:1px solid #d4c9a0;border-radius:6px;background:#fff;font-size:14px;}
  </style>
</head>
<body>
<div class="admin-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">

      <div class="subhead">
        <div>
          <h2>學員檔案</h2>
          <p>以 Email 為單位彙整每位學員的所有測驗紀錄，可展開查看、編輯姓名、刪除特定測驗，並可匯出名單供行銷使用。</p>
        </div>
      </div>

      <div class="stats">
        <div class="stat"><b id="statTotal">0</b><span>學員人數</span></div>
        <div class="stat"><b id="statRepeat">0</b><span>有複測（≥2次）</span></div>
        <div class="stat"><b id="statSingle">0</b><span>僅測1次</span></div>
        <div class="stat"><b id="statTotal3">0</b><span>測驗總筆數</span></div>
      </div>

      <div id="memberMsg" class="notice hidden"></div>

      <div class="filter-row">
        <input id="searchInput" oninput="onFilterChange()" placeholder="搜尋姓名、Email、何倫碼...">
        <select id="counselorFilter" onchange="onFilterChange()"><option value="">全部諮詢師</option></select>
        <select id="repeatFilter" onchange="onFilterChange()">
          <option value="">全部學員</option>
          <option value="repeat">複測（≥2次）</option>
          <option value="single">僅測1次</option>
        </select>
        <select id="hollandFilter" onchange="onFilterChange()">
          <option value="">全部何倫碼首碼</option>
          <option value="R">R（實用型）</option>
          <option value="I">I（研究型）</option>
          <option value="A">A（藝術型）</option>
          <option value="S">S（社會型）</option>
          <option value="E">E（企業型）</option>
          <option value="C">C（事務型）</option>
        </select>
        <button class="btn" style="margin-left:auto" onclick="exportCsv()">匯出 CSV</button>
        <button class="btn" onclick="loadMembers()">重新整理</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:44px">#</th>
              <th style="min-width:120px">姓名</th>
              <th style="min-width:180px">Email</th>
              <th style="width:100px;text-align:center">測驗次數</th>
              <th>測驗結果管理</th>
            </tr>
          </thead>
          <tbody id="memberRows"></tbody>
        </table>
      </div>
      <div id="memberPagination" class="pagination"></div>

    </div>
  </div>
</div>

<script src="admin-common.js"></script>
<script src="admin-auth.js"></script>
<script src="admin-logs.js"></script>
<script>
let allMembers=[];
let filteredMembers=[];
let memberPage=1;
const PAGE_SIZE=25;
const expandedEmails=new Set();

(async function init(){
  const auth=await requireOwner();
  if(!auth) return;
  renderAdminShell("members",{title:"學員檔案",sessionLabel:`已登入：${auth.profile.display_name||auth.session.user.email}`});
  await loadMembers();
})();

async function loadMembers(){
  hideMsg("memberMsg");
  const {data,error}=await sb.from("submissions")
    .select("id,created_at,name,email,counselor_email,holland_code,primary_type,value_top")
    .order("created_at",{ascending:true});
  if(error){showMsg("memberMsg","學員資料讀取失敗："+error.message,true);return;}
  allMembers=buildMemberList(data||[]);
  populateCounselorFilter();
  updateStats();
  onFilterChange();
}

function buildMemberList(submissions){
  const map=new Map();
  submissions.forEach(r=>{
    const key=(r.email||"").toLowerCase().trim();
    if(!key) return;
    if(!map.has(key)) map.set(key,{email:key,name:"",counselorEmail:"",tests:[]});
    const m=map.get(key);
    if(r.name) m.name=r.name;
    if(r.counselor_email) m.counselorEmail=r.counselor_email;
    const vals=Array.isArray(r.value_top)?r.value_top:[];
    m.tests.push({id:r.id,date:r.created_at,hollandCode:r.holland_code||"",primaryType:r.primary_type||"",valueTop2:vals.slice(0,2)});
  });
  // tests already sorted ascending (query order)
  return [...map.values()].sort((a,b)=>{
    const aD=a.tests[a.tests.length-1]?.date||"";
    const bD=b.tests[b.tests.length-1]?.date||"";
    return bD.localeCompare(aD);
  });
}

function populateCounselorFilter(){
  const sel=document.getElementById("counselorFilter");
  const cur=sel.value;
  const set=new Set(allMembers.map(m=>m.counselorEmail).filter(Boolean));
  sel.innerHTML='<option value="">全部諮詢師</option>'+[...set].sort().map(e=>`<option value="${escAttr(e)}">${esc(e)}</option>`).join("");
  if(cur&&set.has(cur)) sel.value=cur;
}

function updateStats(){
  const repeat=allMembers.filter(m=>m.tests.length>=2).length;
  document.getElementById("statTotal").textContent=allMembers.length;
  document.getElementById("statRepeat").textContent=repeat;
  document.getElementById("statSingle").textContent=allMembers.length-repeat;
  document.getElementById("statTotal3").textContent=allMembers.reduce((s,m)=>s+m.tests.length,0);
}

function onFilterChange(){
  memberPage=1;
  const q=document.getElementById("searchInput").value.trim().toLowerCase();
  const counselor=document.getElementById("counselorFilter").value;
  const repeat=document.getElementById("repeatFilter").value;
  const holland=document.getElementById("hollandFilter").value;
  filteredMembers=allMembers.filter(m=>{
    if(counselor&&m.counselorEmail!==counselor) return false;
    if(repeat==="repeat"&&m.tests.length<2) return false;
    if(repeat==="single"&&m.tests.length!==1) return false;
    if(holland&&!m.tests.some(t=>t.primaryType===holland)) return false;
    if(!q) return true;
    return [m.email,m.name,...m.tests.map(t=>t.hollandCode)].some(v=>String(v||"").toLowerCase().includes(q));
  });
  renderMembers();
}

function renderMembers(){
  const {pageItems,page,totalPages}=paginate(filteredMembers,memberPage,PAGE_SIZE);
  memberPage=page;
  const offset=(page-1)*PAGE_SIZE;
  let html="";
  pageItems.forEach((m,li)=>{
    const num=offset+li+1;
    const isRepeat=m.tests.length>=2;
    const isOpen=expandedEmails.has(m.email);
    const ri=`ri${li}`;
    html+=`
    <tr>
      <td style="color:#aaa;font-size:13px">${num}</td>
      <td>
        <span class="name-view" id="nv-${ri}">${esc(m.name)}</span>
        <input class="name-input hidden" id="ni-${ri}" value="${escAttr(m.name)}">
        <button class="icon-btn" id="nb-edit-${ri}" onclick="startEdit('${ri}')" title="編輯姓名">✏</button>
        <button class="icon-btn green hidden" id="nb-save-${ri}" onclick="saveEdit('${ri}','${escAttr(m.email)}')" title="儲存">✓</button>
        <button class="icon-btn red hidden" id="nb-cancel-${ri}" onclick="cancelEdit('${ri}','${escAttr(m.name)}')" title="取消">✗</button>
      </td>
      <td style="font-size:13px">${esc(m.email)}</td>
      <td style="text-align:center">
        ${isRepeat?`<span class="repeat-badge">複測 ${m.tests.length}次</span>`:`<span class="cnt-badge">${m.tests.length}次</span>`}
      </td>
      <td>
        <button class="expand-btn${isOpen?" open":""}" id="eb-${ri}" onclick="toggleDetail('${ri}','${escAttr(m.email)}')">
          ${isOpen?"▲ 收合":"▼ 展開記錄"}
        </button>
      </td>
    </tr>
    <tr class="detail-row" id="dr-${ri}" style="${isOpen?"":"display:none"}">
      <td colspan="5">
        <div class="detail-inner">
          <div class="detail-info">諮詢師：${esc(m.counselorEmail||"—")}</div>
          ${m.tests.length?`
          <table class="inner-table">
            <thead><tr><th>#</th><th>測驗日期</th><th>何倫碼</th><th>價值觀前2</th><th>操作</th></tr></thead>
            <tbody>
              ${m.tests.map((t,ti)=>`
              <tr>
                <td style="color:#aaa">${ti+1}</td>
                <td>${esc(String(t.date||"").slice(0,10))}</td>
                <td><span class="test-code">${esc(t.hollandCode)}</span></td>
                <td>${t.valueTop2.length?esc(t.valueTop2.join("、")):"—"}</td>
                <td><button class="btn danger" style="padding:4px 10px;font-size:12px" onclick="deleteTest('${escAttr(t.id)}','${escAttr(m.email)}')">刪除此筆</button></td>
              </tr>`).join("")}
            </tbody>
          </table>`:`<div class="no-tests">尚無測驗記錄。</div>`}
        </div>
      </td>
    </tr>`;
  });
  document.getElementById("memberRows").innerHTML=html||`<tr><td colspan="5" class="empty-state">尚無符合條件的學員資料。</td></tr>`;
  renderPagination("memberPagination",page,totalPages,p=>{memberPage=p;renderMembers();});
}

function toggleDetail(ri,email){
  const dr=document.getElementById(`dr-${ri}`);
  const btn=document.getElementById(`eb-${ri}`);
  if(!dr) return;
  const isOpen=dr.style.display!=="none";
  dr.style.display=isOpen?"none":"";
  btn.textContent=isOpen?"▼ 展開記錄":"▲ 收合";
  btn.classList.toggle("open",!isOpen);
  if(isOpen) expandedEmails.delete(email);
  else expandedEmails.add(email);
}

// ── 行內編輯姓名 ──────────────────────────────────────────────
function startEdit(ri){
  document.getElementById(`nv-${ri}`).classList.add("hidden");
  document.getElementById(`ni-${ri}`).classList.remove("hidden");
  document.getElementById(`nb-edit-${ri}`).classList.add("hidden");
  document.getElementById(`nb-save-${ri}`).classList.remove("hidden");
  document.getElementById(`nb-cancel-${ri}`).classList.remove("hidden");
  document.getElementById(`ni-${ri}`).focus();
  document.getElementById(`ni-${ri}`).select();
}
function cancelEdit(ri,origName){
  document.getElementById(`ni-${ri}`).value=origName;
  document.getElementById(`nv-${ri}`).classList.remove("hidden");
  document.getElementById(`ni-${ri}`).classList.add("hidden");
  document.getElementById(`nb-edit-${ri}`).classList.remove("hidden");
  document.getElementById(`nb-save-${ri}`).classList.add("hidden");
  document.getElementById(`nb-cancel-${ri}`).classList.add("hidden");
}
async function saveEdit(ri,email){
  const newName=document.getElementById(`ni-${ri}`).value.trim();
  if(!newName){showMsg("memberMsg","姓名不可空白。",true);return;}
  hideMsg("memberMsg");
  const {error}=await sb.from("submissions").update({name:newName}).eq("email",email);
  if(error){showMsg("memberMsg","更新失敗："+error.message,true);return;}
  expandedEmails.add(email);
  showMsg("memberMsg","姓名已更新。");
  await loadMembers();
}

// ── 刪除單筆測驗 ──────────────────────────────────────────────
async function deleteTest(submissionId,email){
  if(!confirm("確定刪除此筆測驗記錄？此操作無法復原。")) return;
  hideMsg("memberMsg");
  const {error}=await sb.from("submissions").delete().eq("id",submissionId);
  if(error){showMsg("memberMsg","刪除失敗："+error.message,true);return;}
  expandedEmails.add(email);
  showMsg("memberMsg","測驗記錄已刪除。");
  await logAction({actionType:"delete_submission",targetType:"submission",targetId:submissionId,after:{email}});
  await loadMembers();
}

// ── 匯出 CSV ─────────────────────────────────────────────────
function exportCsv(){
  const headers=["Email","姓名","諮詢師","測驗次數","第1次日期","第1次何倫碼","第1次價值觀前2","第2次日期","第2次何倫碼","第2次價值觀前2"];
  const csvRows=filteredMembers.map(m=>{
    const t1=m.tests[0]||null;
    const t2=m.tests[1]||null;
    return [
      m.email, m.name, m.counselorEmail||"", m.tests.length,
      t1?String(t1.date||"").slice(0,10):"", t1?t1.hollandCode:"", t1?t1.valueTop2.join("、"):"",
      t2?String(t2.date||"").slice(0,10):"", t2?t2.hollandCode:"", t2?t2.valueTop2.join("、"):"",
    ];
  });
  const csv=[headers,...csvRows].map(r=>r.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\r\n");
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`學員檔案_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  logAction({actionType:"export_members",targetType:"members",after:{count:filteredMembers.length}});
}
</script>
</body>
</html>
