<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>題目管理｜管理後台｜知己知途</title>
  <link rel="stylesheet" href="admin-layout.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    .q-tabs{display:flex;gap:0;border-bottom:2px solid #d4c9a0;margin-bottom:20px;}
    .q-tab{padding:10px 22px;cursor:pointer;font-size:14px;font-weight:600;color:#7a5c00;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s;}
    .q-tab.active{color:#3a2e00;border-bottom-color:#b8860b;background:#fff8e8;}
    .q-tab:hover:not(.active){background:#f8f3e6;}
    .q-panel{display:none;}
    .q-panel.active{display:block;}

    .h-sec-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
    .h-sec-btn{padding:7px 16px;border:1.5px solid #d4c9a0;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;background:#f8f3e6;color:#7a5c00;transition:.15s;}
    .h-sec-btn.active{background:#b8860b;color:#fff;border-color:#b8860b;}
    .h-sec-panel{display:none;}
    .h-sec-panel.active{display:block;}

    .accordion{border:1px solid #d4c9a0;border-radius:8px;margin-bottom:10px;overflow:hidden;}
    .acc-head{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#f8f3e6;cursor:pointer;font-weight:700;font-size:14px;color:#3a2e00;user-select:none;}
    .acc-head:hover{background:#f0ead8;}
    .acc-arrow{font-size:12px;transition:.2s;color:#b8860b;}
    .accordion.open .acc-arrow{transform:rotate(90deg);}
    .acc-body{display:none;padding:12px 16px 16px;background:#fff;}
    .accordion.open .acc-body{display:block;}

    .q-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .q-num{min-width:26px;font-size:12px;color:#aaa;font-weight:700;text-align:right;}
    .q-input{flex:1;padding:6px 10px;border:1px solid #d4c9a0;border-radius:6px;font-size:13px;font-family:inherit;transition:.15s;}
    .q-input:focus{border-color:#b8860b;outline:none;background:#fffbf0;}
    .q-input.changed{border-color:#e08000;background:#fffbf0;}

    .super-group{border:1px solid #d4c9a0;border-radius:10px;margin-bottom:14px;overflow:hidden;}
    .super-head{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#f8f3e6;cursor:pointer;font-weight:700;font-size:14px;color:#3a2e00;}
    .super-head:hover{background:#f0ead8;}
    .super-head .badge{font-size:12px;color:#888;font-weight:400;}
    .super-body{display:none;padding:12px 16px 16px;}
    .super-group.open .super-body{display:block;}
    .super-group.open .acc-arrow{transform:rotate(90deg);}
    .super-meta{display:grid;grid-template-columns:auto 1fr;gap:6px 12px;margin-bottom:12px;font-size:13px;align-items:center;}
    .super-meta label{color:#888;font-weight:600;white-space:nowrap;}
    .super-meta input,.super-meta textarea{padding:5px 8px;border:1px solid #d4c9a0;border-radius:5px;font-size:13px;font-family:inherit;}
    .super-meta input:focus,.super-meta textarea:focus{border-color:#b8860b;outline:none;}
    .super-meta textarea{resize:vertical;min-height:46px;}
    .super-items-label{font-size:12px;font-weight:700;color:#7a5c00;margin-bottom:6px;margin-top:4px;}

    .riasec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
    .riasec-card{border:1px solid #d4c9a0;border-radius:10px;overflow:hidden;}
    .riasec-card-head{padding:10px 16px;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;}
    .riasec-card-body{padding:12px 16px 16px;}
    .r-field{margin-bottom:10px;}
    .r-field label{display:block;font-size:12px;color:#888;font-weight:600;margin-bottom:3px;}
    .r-field input,.r-field textarea{width:100%;box-sizing:border-box;padding:6px 10px;border:1px solid #d4c9a0;border-radius:6px;font-size:13px;font-family:inherit;}
    .r-field input:focus,.r-field textarea:focus{border-color:#b8860b;outline:none;background:#fffbf0;}
    .r-field textarea{resize:vertical;min-height:56px;}

    .ability-section{margin-bottom:24px;}
    .ability-section h4{font-size:14px;font-weight:700;color:#3a2e00;margin-bottom:10px;border-bottom:1px solid #e8dfc0;padding-bottom:6px;}
    .ability-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
    .ability-item{display:flex;flex-direction:column;gap:4px;}
    .ability-item label{font-size:12px;color:#888;font-weight:700;}
    .ability-item input{padding:6px 10px;border:1px solid #d4c9a0;border-radius:6px;font-size:13px;font-family:inherit;}
    .ability-item input:focus{border-color:#b8860b;outline:none;}

    .action-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px;padding:14px 18px;background:#fff8e8;border:1.5px solid #d4c9a0;border-radius:10px;}
    .action-bar .version-info{font-size:13px;color:#888;flex:1;min-width:120px;}
    .action-bar .version-info b{color:#3a2e00;}
    .btn-publish{background:#b8860b;color:#fff;border:none;border-radius:8px;padding:9px 22px;font-size:14px;font-weight:700;cursor:pointer;}
    .btn-publish:hover:not(:disabled){background:#9a6e08;}
    .btn-publish:disabled{opacity:.5;cursor:default;}
    .btn-reset{background:#f0ead8;color:#7a5c00;border:1.5px solid #c9b870;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;}
    .btn-reset:hover{background:#e5dcbf;}

    .type-badge{display:inline-block;width:22px;height:22px;border-radius:50%;background:#b8860b;color:#fff;font-size:11px;font-weight:900;line-height:22px;text-align:center;flex-shrink:0;}
    .R .riasec-card-head{background:#fff3e0;} .R .type-badge{background:#e67e22;}
    .I .riasec-card-head{background:#e8f4fd;} .I .type-badge{background:#2980b9;}
    .A .riasec-card-head{background:#fdf0f8;} .A .type-badge{background:#8e44ad;}
    .S .riasec-card-head{background:#eafaf1;} .S .type-badge{background:#27ae60;}
    .E .riasec-card-head{background:#fff9e6;} .E .type-badge{background:#f39c12;}
    .C .riasec-card-head{background:#eaf0fb;} .C .type-badge{background:#2c3e8c;}

    #qMsg{margin-bottom:14px;}
    .notice.hidden{display:none;}
  </style>
</head>
<body>
<div class="admin-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar" id="topbar"></header>
    <div class="content">

      <div class="subhead">
        <div>
          <h2>題目管理</h2>
          <p>編輯前台 5 關的所有 262 題（荷倫興趣/能力/職業 198 題 + 天賦雷達能力標籤 12 題 + SUPER 工作價值觀 52 題），完成後點「發布到前台」即同步。</p>
        </div>
      </div>

      <div id="qMsg" class="notice hidden"></div>

      <div class="action-bar">
        <div class="version-info" id="versionInfo">載入中…</div>
        <button class="btn-reset" onclick="resetDefault()">還原預設題目</button>
        <button class="btn-publish" id="btnPublish" onclick="publishQuestions()">發布到前台</button>
      </div>

      <!-- 主分頁 -->
      <div class="q-tabs">
        <button class="q-tab active" onclick="switchTab('holland',this)">荷倫興趣題目</button>
        <button class="q-tab" onclick="switchTab('super',this)">SUPER 工作價值觀</button>
        <button class="q-tab" onclick="switchTab('riasec',this)">RIASEC 說明 & 能力標籤</button>
      </div>

      <!-- Tab 1：荷倫興趣題目 -->
      <div class="q-panel active" id="panel-holland">
        <div class="h-sec-tabs" id="hollandSecTabs"></div>
        <div id="hollandSecPanels"></div>
      </div>

      <!-- Tab 2：SUPER 工作價值觀 -->
      <div class="q-panel" id="panel-super">
        <div id="superPanels"></div>
      </div>

      <!-- Tab 3：RIASEC 說明 & 能力標籤 -->
      <div class="q-panel" id="panel-riasec">
        <div class="riasec-grid" id="riasecCards"></div>
        <div class="ability-section" style="margin-top:24px;">
          <div style="background:#fff8e8;border:1px solid #d4c9a0;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#666;">
            <b style="color:#3a2e00">第3關｜天賦雷達校準艙（共 12 題）</b>　學員以 1-7 分自評 6 型×2 表，合計 12 個評分項目。修改標籤名稱後會同步到前台雷達圖。
          </div>
          <h4>表 A｜工作能力標籤（6 項）</h4>
          <div class="ability-grid" id="abilityAGrid"></div>
        </div>
        <div class="ability-section">
          <h4>表 B｜技能能力標籤（6 項）</h4>
          <div class="ability-grid" id="abilityBGrid"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="admin-common.js"></script>
<script src="admin-auth.js"></script>
<script>

// ============================================================
// 狀態
// ============================================================
let editData = null;
let dbVersion = null;
let dbUpdatedAt = null;
let dbUpdatedBy = null;

const TYPES = ["R","I","A","S","E","C"];

// ============================================================
// 初始化
// ============================================================
(async function init(){
  const auth = await requireOwner();
  if(!auth) return;
  renderAdminShell("questions", {title:"題目管理", sessionLabel: auth.profile.email});

  await loadFromDB();
  renderAll();
})();

async function loadFromDB(){
  try {
    const { data, error } = await sb.from("questions")
      .select("data,version,updated_at,updated_by")
      .eq("id","main")
      .maybeSingle();

    if(error) throw error;
    if(data && data.data){
      const d = data.data;
      dbVersion = data.version;
      dbUpdatedAt = data.updated_at;
      dbUpdatedBy = data.updated_by;
      editData = JSON.parse(JSON.stringify(DEFAULT_DATA));
      if(d.hollandSections) editData.hollandSections = d.hollandSections;
      if(d.superGroups)     editData.superGroups = d.superGroups;
      if(d.riasec)          editData.riasec = d.riasec;
      if(d.abilityA)        editData.abilityA = d.abilityA;
      if(d.abilityB)        editData.abilityB = d.abilityB;
      updateVersionInfo();
    } else {
      editData = JSON.parse(JSON.stringify(DEFAULT_DATA));
      document.getElementById("versionInfo").innerHTML = "目前使用<b>預設題目</b>（尚未發布到資料庫）";
    }
  } catch(e) {
    editData = JSON.parse(JSON.stringify(DEFAULT_DATA));
    document.getElementById("versionInfo").innerHTML = `<span style="color:#c00">無法連線資料庫，顯示預設題目（${e.message}）</span>`;
  }
}

function updateVersionInfo(){
  const el = document.getElementById("versionInfo");
  if(!el) return;
  const at = dbUpdatedAt ? fmtTime(dbUpdatedAt) : "—";
  const by = dbUpdatedBy || "—";
  el.innerHTML = `版本 <b>v${dbVersion||"?"}</b>　最後發布：<b>${at}</b>　發布者：<b>${by}</b>`;
}

// ============================================================
// 分頁切換
// ============================================================
function switchTab(name, btn){
  document.querySelectorAll(".q-tab").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".q-panel").forEach(p=>p.classList.remove("active"));
  if(btn) btn.classList.add("active");
  const p = document.getElementById("panel-"+name);
  if(p) p.classList.add("active");
}

// ============================================================
// 渲染全部
// ============================================================
function renderAll(){
  renderHolland();
  renderSuper();
  renderRiasec();
}

// ============================================================
// Tab 1：荷倫興趣題目
// ============================================================
function renderHolland(){
  const tabsEl = document.getElementById("hollandSecTabs");
  const panelsEl = document.getElementById("hollandSecPanels");
  if(!tabsEl || !panelsEl || !editData) return;

  const sections = editData.hollandSections;
  tabsEl.innerHTML = sections.map((sec,i)=>`
    <button class="h-sec-btn${i===0?" active":""}" onclick="switchHollandSec('${sec.id}',this)">${sec.title.split("｜")[0]}</button>
  `).join("");

  panelsEl.innerHTML = sections.map((sec,i)=>`
    <div class="h-sec-panel${i===0?" active":""}" id="hpanel-${sec.id}">
      <div style="margin-bottom:14px;padding:10px 14px;background:#f8f3e6;border-radius:8px;font-size:13px;color:#666;">
        <b style="color:#3a2e00">${esc(sec.title)}</b>　題目提示：${esc(sec.question)}
      </div>
      ${TYPES.map(t=>`
        <div class="accordion" id="acc-${sec.id}-${t}">
          <div class="acc-head" onclick="toggleAcc('acc-${sec.id}-${t}')">
            <span>${esc(editData.riasec[t]?.emoji||"")} ${t} 型 — ${esc(editData.riasec[t]?.name||t)}（11題）</span>
            <span class="acc-arrow">▶</span>
          </div>
          <div class="acc-body" id="body-${sec.id}-${t}">
            ${(sec.types[t]||[]).map((q,qi)=>`
              <div class="q-row">
                <span class="q-num">${qi+1}</span>
                <input class="q-input" data-sec="${sec.id}" data-type="${t}" data-idx="${qi}"
                  value="${escAttr(q)}" oninput="onQInput(this)">
              </div>
            `).join("")}
          </div>
        </div>
      `).join("")}
    </div>
  `).join("");
}

function switchHollandSec(id, btn){
  document.querySelectorAll(".h-sec-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".h-sec-panel").forEach(p=>p.classList.remove("active"));
  if(btn) btn.classList.add("active");
  const p = document.getElementById("hpanel-"+id);
  if(p) p.classList.add("active");
}

function toggleAcc(id){
  const el = document.getElementById(id);
  if(el) el.classList.toggle("open");
}

function onQInput(input){
  const sec = input.dataset.sec;
  const t = input.dataset.type;
  const idx = parseInt(input.dataset.idx,10);
  const sectionObj = editData.hollandSections.find(s=>s.id===sec);
  if(sectionObj) sectionObj.types[t][idx] = input.value;
  input.classList.add("changed");
}

// ============================================================
// Tab 2：SUPER 工作價值觀
// ============================================================
function renderSuper(){
  const el = document.getElementById("superPanels");
  if(!el || !editData) return;
  el.innerHTML = editData.superGroups.map((g,gi)=>`
    <div class="super-group" id="sg-${g.id}">
      <div class="super-head" onclick="toggleSuperGroup('sg-${g.id}')">
        <span class="acc-arrow" style="font-size:12px;color:#b8860b;">▶</span>
        <span>${esc(g.emoji)} ${esc(g.id)} ${esc(g.name)}</span>
        <span class="badge">（${g.items.length}題）</span>
      </div>
      <div class="super-body">
        <div class="super-meta">
          <label>群組名稱</label>
          <input value="${escAttr(g.name)}" oninput="onSuperMeta(${gi},'name',this.value)">
          <label>Emoji</label>
          <input value="${escAttr(g.emoji)}" style="width:70px" oninput="onSuperMeta(${gi},'emoji',this.value)">
          <label>說明</label>
          <textarea oninput="onSuperMeta(${gi},'desc',this.value)">${esc(g.desc)}</textarea>
        </div>
        <div class="super-items-label">4 道題目</div>
        ${g.items.map((item,ii)=>`
          <div class="q-row">
            <span class="q-num">${ii+1}</span>
            <input class="q-input" value="${escAttr(item)}" oninput="onSuperItem(${gi},${ii},this.value)">
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");
}

function toggleSuperGroup(id){
  const el = document.getElementById(id);
  if(el) el.classList.toggle("open");
}

function onSuperMeta(gi, field, val){
  editData.superGroups[gi][field] = val;
}
function onSuperItem(gi, ii, val){
  editData.superGroups[gi].items[ii] = val;
}

// ============================================================
// Tab 3：RIASEC 說明 & 能力標籤
// ============================================================
function renderRiasec(){
  const cardsEl = document.getElementById("riasecCards");
  const abilityAEl = document.getElementById("abilityAGrid");
  const abilityBEl = document.getElementById("abilityBGrid");
  if(!cardsEl || !editData) return;

  cardsEl.innerHTML = TYPES.map(t=>{
    const r = editData.riasec[t]||{};
    return `
      <div class="riasec-card ${t}">
        <div class="riasec-card-head">
          <span class="type-badge">${t}</span>
          <span>${esc(r.emoji||"")} ${esc(r.name||t)}</span>
        </div>
        <div class="riasec-card-body">
          <div class="r-field"><label>名稱</label>
            <input value="${escAttr(r.name||"")}" oninput="onRiasec('${t}','name',this.value)">
          </div>
          <div class="r-field"><label>Emoji</label>
            <input value="${escAttr(r.emoji||"")}" style="width:80px" oninput="onRiasec('${t}','emoji',this.value)">
          </div>
          <div class="r-field"><label>職業角色</label>
            <input value="${escAttr(r.role||"")}" oninput="onRiasec('${t}','role',this.value)">
          </div>
          <div class="r-field"><label>描述</label>
            <textarea oninput="onRiasec('${t}','desc',this.value)">${esc(r.desc||"")}</textarea>
          </div>
          <div class="r-field"><label>職涯建議</label>
            <textarea oninput="onRiasec('${t}','advice',this.value)">${esc(r.advice||"")}</textarea>
          </div>
        </div>
      </div>`;
  }).join("");

  if(abilityAEl){
    abilityAEl.innerHTML = TYPES.map(t=>`
      <div class="ability-item">
        <label>${t} 型</label>
        <input value="${escAttr(editData.abilityA[t]||"")}" oninput="editData.abilityA['${t}']=this.value">
      </div>`).join("");
  }
  if(abilityBEl){
    abilityBEl.innerHTML = TYPES.map(t=>`
      <div class="ability-item">
        <label>${t} 型</label>
        <input value="${escAttr(editData.abilityB[t]||"")}" oninput="editData.abilityB['${t}']=this.value">
      </div>`).join("");
  }
}

function onRiasec(t, field, val){
  if(!editData.riasec[t]) editData.riasec[t]={};
  editData.riasec[t][field] = val;
}

// ============================================================
// 發布到前台
// ============================================================
async function publishQuestions(){
  const btn = document.getElementById("btnPublish");
  btn.disabled = true;
  btn.textContent = "發布中…";
  hideMsg("qMsg");
  try {
    const {data:{session}} = await sb.auth.getSession();
    if(!session) throw new Error("登入已逾時，請重新整理頁面");

    const newVersion = (dbVersion||0) + 1;
    const payload = {
      id: "main",
      data: editData,
      version: newVersion,
      updated_at: new Date().toISOString(),
      updated_by: currentProfile?.email || session.user.email || "owner"
    };

    const { error } = await sb.from("questions")
      .upsert(payload, {onConflict:"id"});

    if(error) throw error;

    dbVersion = newVersion;
    dbUpdatedAt = payload.updated_at;
    dbUpdatedBy = payload.updated_by;
    updateVersionInfo();
    showMsg("qMsg","✅ 發布成功！前台學員下次進入第2關時將自動載入最新題目。");
  } catch(e){
    showMsg("qMsg","❌ 發布失敗："+e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = "發布到前台";
  }
}

// ============================================================
// 還原預設題目
// ============================================================
function resetDefault(){
  if(!confirm("確定要還原為預設題目？（目前在頁面上的所有編輯將被清除，但不會立即影響前台——需再點「發布到前台」才正式同步）")) return;
  editData = JSON.parse(JSON.stringify(DEFAULT_DATA));
  renderAll();
  showMsg("qMsg","已還原為預設題目（記得點「發布到前台」才會同步到前台）。");
}
</script>
